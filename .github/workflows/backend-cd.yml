name: Backend CD

# [eks-gitops-reform] dev(develop)=EKS ArgoCD GitOps / prod(main)=EKS ArgoCD GitOps
on:
  push:
    branches: [develop, main]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target (수동 trigger 시에만 사용)'
        required: true
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write   # AWS OIDC
  contents: write   # [dev] GitOps: overlay 태그 커밋·푸시

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env_name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: resolve-env
    runs-on: ubuntu-24.04-arm   # 네이티브 arm64 러너 (QEMU 에뮬레이션 제거)
    environment: ${{ needs.resolve-env.outputs.env_name }}

    env:
      AWS_REGION: ap-northeast-2
      ENV_NAME: ${{ needs.resolve-env.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build JAR (native arm + gradle cache)
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test
          # Docker 가 복사할 위치로 산출물 이동 (.dockerignore 의 build/ 제외 회피)
          cp build/libs/*-SNAPSHOT.jar app.jar

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/drawe-${{ env.ENV_NAME }}-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image (native arm64 + ECR layer cache)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false   # ECR 호환(단일 매니페스트)
          tags: |
            ${{ steps.ecr.outputs.registry }}/drawe-${{ env.ENV_NAME }}-backend:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/drawe-${{ env.ENV_NAME }}-backend:latest
          # ECR 레지스트리 레이어 캐시 (otel agent·RDS cert·유저 레이어 재사용, jar 만 갱신)
          cache-from: type=registry,ref=${{ steps.ecr.outputs.registry }}/drawe-${{ env.ENV_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ steps.ecr.outputs.registry }}/drawe-${{ env.ENV_NAME }}-backend:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      # ───────── DEV: EKS GitOps (ArgoCD) ─────────
      - name: "[dev] Bump overlay newTag → commit (ArgoCD GitOps)"
        if: env.ENV_NAME == 'dev'
        env:
          OVERLAY: infra/k8s/overlays/dev/backend/kustomization.yaml
          SHA: ${{ github.sha }}
        run: |
          sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          if git diff --cached --quiet; then
            echo "newTag 이미 ${SHA} — 커밋 없음"; exit 0
          fi
          git commit -m "ci(dev): bump backend image -> ${SHA} [skip ci]"
          # 동시 push 경합(race) 대비 — rebase 후 재시도 (최대 5회).
          # 다른 CD 가 먼저 main 을 옮기면 push 가 non-fast-forward 로 거부되므로,
          # 내 bump 커밋은 유지한 채 origin 을 rebase 로 당겨 위로 얹고 다시 push.
          REF="${{ github.ref_name }}"
          git config pull.rebase true
          # [fix] 러너의 무관한 추적파일(terraform 산출물 등)로 작업트리가 더러우면
          #       git pull --rebase 가 'unstaged changes' 로 막혀 rebase 가 시작도 못 한다.
          #       우리 bump 커밋만 남기고 트리를 깨끗이 한다(러너 1회용 → stash 미복구 OK).
          git stash push --include-untracked --quiet || true
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${REF}"; then
              echo "✅ overlay 갱신 푸시 — ArgoCD(develop 추적)가 롤아웃합니다."
              exit 0
            fi
            echo "⚠ push 거부(경합 추정) — 재시도 ${attempt}/5: origin/${REF} rebase"
            if ! git pull --rebase origin "${REF}"; then
              # 같은 overlay 를 양쪽이 건드려 충돌 → 우리 newTag(${SHA})로 해소
              echo "rebase 충돌 — newTag ${SHA} 로 재적용"
              sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\\1${SHA}|" "$OVERLAY"
              git add "$OVERLAY"
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                GIT_EDITOR=true git rebase --continue || git rebase --abort
              else
                # [fix] rebase 미시작(더티 트리/네트워크 등) → 'no rebase in progress' 로 죽지 않게 정리만
                git rebase --abort >/dev/null 2>&1 || true
                git stash push --include-untracked --quiet || true
              fi
            fi
            sleep $((RANDOM % 5 + 2))   # 2~6초 지터로 동시 재시도 분산
          done
          echo "✘ 5회 재시도 후에도 push 실패 — 수동 확인 필요"; exit 1

      # ───────── PROD: EKS GitOps (ArgoCD) ─────────
      - name: "[prod] Bump overlay newTag → commit (ArgoCD GitOps)"
        if: env.ENV_NAME == 'prod'
        env:
          OVERLAY: infra/k8s/overlays/prod/backend/kustomization.yaml
          SHA: ${{ github.sha }}
        run: |
          sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          if git diff --cached --quiet; then
            echo "newTag 이미 ${SHA} — 커밋 없음"; exit 0
          fi
          git commit -m "ci(prod): bump backend image -> ${SHA} [skip ci]"
          # 동시 push 경합(race) 대비 — rebase 후 재시도 (최대 5회).
          # 다른 CD 가 먼저 main 을 옮기면 push 가 non-fast-forward 로 거부되므로,
          # 내 bump 커밋은 유지한 채 origin 을 rebase 로 당겨 위로 얹고 다시 push.
          REF="${{ github.ref_name }}"
          git config pull.rebase true
          # [fix] 러너의 무관한 추적파일(terraform 산출물 등)로 작업트리가 더러우면
          #       git pull --rebase 가 'unstaged changes' 로 막혀 rebase 가 시작도 못 한다.
          #       우리 bump 커밋만 남기고 트리를 깨끗이 한다(러너 1회용 → stash 미복구 OK).
          git stash push --include-untracked --quiet || true
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${REF}"; then
              echo "✅ overlay 갱신 푸시 — ArgoCD(main 추적)가 롤아웃합니다."
              exit 0
            fi
            echo "⚠ push 거부(경합 추정) — 재시도 ${attempt}/5: origin/${REF} rebase"
            if ! git pull --rebase origin "${REF}"; then
              # 같은 overlay 를 양쪽이 건드려 충돌 → 우리 newTag(${SHA})로 해소
              echo "rebase 충돌 — newTag ${SHA} 로 재적용"
              sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\\1${SHA}|" "$OVERLAY"
              git add "$OVERLAY"
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                GIT_EDITOR=true git rebase --continue || git rebase --abort
              else
                # [fix] rebase 미시작(더티 트리/네트워크 등) → 'no rebase in progress' 로 죽지 않게 정리만
                git rebase --abort >/dev/null 2>&1 || true
                git stash push --include-untracked --quiet || true
              fi
            fi
            sleep $((RANDOM % 5 + 2))   # 2~6초 지터로 동시 재시도 분산
          done
          echo "✘ 5회 재시도 후에도 push 실패 — 수동 확인 필요"; exit 1

      # ───────── PROD → develop 동기화 (승격 롤백 방지 / drift 차단) ─────────
      # main 의 prod overlay 를 방금 ${SHA} 로 올렸으니, develop 이 든 '같은 파일 사본' 도
      # 같은 값으로 맞춘다. 다음 develop→main 승격(merge) 때 낡은 사본이 prod 를 롤백시키지 않게 함.
      # overlays/prod 만 건드리므로 ArgoCD-dev(overlays/dev 추적)에는 무영향 = dev 재배포 없음.
      # develop push 는 paths 필터(코드 경로)와 무관 + [skip ci] → CD 재트리거 없음.
      - name: "[prod->develop] Sync develop's prod overlay (backend, drift 방지)"
        if: env.ENV_NAME == 'prod'
        env:
          OVERLAY: infra/k8s/overlays/prod/backend/kustomization.yaml
          SHA: ${{ github.sha }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash push --include-untracked --quiet || true
          git fetch --quiet origin develop
          git checkout -f -B _sync_prod_to_develop origin/develop
          sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
          git add "$OVERLAY"
          if git diff --cached --quiet; then
            echo "develop 의 prod overlay 이미 ${SHA} — 동기화 불필요"; exit 0
          fi
          git commit -m "ci(sync): develop prod overlay(backend) -> ${SHA} [skip ci]"
          git config pull.rebase true
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:develop"; then
              echo "OK: develop 의 prod/backend overlay 를 ${SHA} 로 동기화 (승격 롤백 방지)."
              exit 0
            fi
            echo "push 거부(경합) — 재시도 ${attempt}/5: origin/develop rebase"
            if ! git pull --rebase origin develop; then
              sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
              git add "$OVERLAY"
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                GIT_EDITOR=true git rebase --continue || git rebase --abort
              else
                git rebase --abort >/dev/null 2>&1 || true
              fi
            fi
            sleep $((RANDOM % 5 + 2))
          done
          echo "develop 동기화 push 실패 — 옵션3 게이트가 승격 시 잡아줌(수동 확인 권장)"; exit 1
