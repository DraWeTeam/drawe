name: Backend CD

# [eks-gitops-reform] dev(develop)=EKS ArgoCD GitOps / prod(main)=EKS ArgoCD GitOps
on:
  push:
    branches: [develop, main]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target (수동 trigger 시에만 사용)'
        required: true
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write   # AWS OIDC
  contents: write   # [dev] GitOps: overlay 태그 커밋·푸시

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env_name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env_name }}

    env:
      AWS_REGION: ap-northeast-2
      ENV_NAME: ${{ needs.resolve-env.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build JAR
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/drawe-${{ env.ENV_NAME }}-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image
        id: build
        working-directory: backend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: drawe-${{ env.ENV_NAME }}-backend
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
              --platform linux/arm64 \
              --tag $REGISTRY/$REPO:$TAG \
              --tag $REGISTRY/$REPO:latest \
              --push \
              .
          echo "image_uri=$REGISTRY/$REPO:$TAG" >> $GITHUB_OUTPUT

      # ───────── DEV: EKS GitOps (ArgoCD) ─────────
      - name: "[dev] Bump overlay newTag → commit (ArgoCD GitOps)"
        if: env.ENV_NAME == 'dev'
        env:
          OVERLAY: infra/k8s/overlays/dev/backend/kustomization.yaml
          SHA: ${{ github.sha }}
        run: |
          sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          if git diff --cached --quiet; then
            echo "newTag 이미 ${SHA} — 커밋 없음"; exit 0
          fi
          git commit -m "ci(dev): bump backend image -> ${SHA} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "✅ overlay 갱신 푸시 — ArgoCD(develop 추적)가 롤아웃합니다."

      # ───────── PROD: EKS GitOps (ArgoCD) ─────────
      - name: "[prod] Bump overlay newTag → commit (ArgoCD GitOps)"
        if: env.ENV_NAME == 'prod'
        env:
          OVERLAY: infra/k8s/overlays/prod/backend/kustomization.yaml
          SHA: ${{ github.sha }}
        run: |
          sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          if git diff --cached --quiet; then
            echo "newTag 이미 ${SHA} — 커밋 없음"; exit 0
          fi
          git commit -m "ci(prod): bump backend image -> ${SHA} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "✅ overlay 갱신 푸시 — ArgoCD(main 추적)가 롤아웃합니다."
