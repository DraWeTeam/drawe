name: FastAPI CD

# [eks-gitops-reform] dev(develop)=EKS ArgoCD GitOps / prod(main)=ECS(유지)
on:
  push:
    branches: [develop, main]
    paths:
      - "fastapi/**"
      - "!fastapi/guide/**"
      - "!fastapi/assets/**"
      - "!fastapi/Dockerfile.guide"
      - "!fastapi/requirements.guide.txt"
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  id-token: write
  contents: write

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.resolve.outputs.env_name }}
    steps:
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env_name=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.env_name }}

    env:
      AWS_REGION: ap-northeast-2
      ENV_NAME: ${{ needs.resolve-env.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (ARM64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/drawe-${{ env.ENV_NAME }}-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image (linux/arm64)
        id: build
        working-directory: fastapi
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: drawe-${{ env.ENV_NAME }}-fastapi
          TAG: ${{ github.sha }}
        run: |
          docker buildx build \
              --platform linux/arm64 \
              -t $REGISTRY/$REPO:$TAG \
              -t $REGISTRY/$REPO:latest \
              --push \
              .
          echo "image_uri=$REGISTRY/$REPO:$TAG" >> $GITHUB_OUTPUT

      # ───────── DEV: EKS GitOps (ArgoCD) ─────────
      - name: "[dev] Bump overlay newTag → commit (ArgoCD GitOps)"
        if: env.ENV_NAME == 'dev'
        env:
          OVERLAY: infra/k8s/overlays/dev/fastapi-embed/kustomization.yaml
          SHA: ${{ github.sha }}
        run: |
          sed -i -E "s|(newTag:[[:space:]]*)[A-Za-z0-9._-]+|\1${SHA}|" "$OVERLAY"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY"
          if git diff --cached --quiet; then
            echo "newTag 이미 ${SHA} — 커밋 없음"; exit 0
          fi
          git commit -m "ci(dev): bump fastapi-embed image -> ${SHA} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "✅ overlay 갱신 푸시 — ArgoCD(develop 추적)가 롤아웃합니다."

      # ───────── PROD: ECS (유지) ─────────
      - name: Register new task definition with SHA tag
        if: env.ENV_NAME == 'prod'
        id: register-td
        env:
          SERVICE: drawe-${{ env.ENV_NAME }}-fastapi
          CONTAINER_NAME: drawe-${{ env.ENV_NAME }}-fastapi
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          aws ecs describe-task-definition \
              --task-definition $SERVICE \
              --region $AWS_REGION \
              --query 'taskDefinition' > td.json

          jq --arg img "$IMAGE_URI" --arg name "$CONTAINER_NAME" \
              '.containerDefinitions |= map(if .name == $name then .image = $img else . end) |
               del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .compatibilities, .registeredAt, .registeredBy)' \
              td.json > td-new.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
              --cli-input-json file://td-new.json \
              --region $AWS_REGION \
              --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "td_arn=$NEW_TD_ARN" >> $GITHUB_OUTPUT
          echo "✅ New TD registered: $NEW_TD_ARN"

      - name: Update ECS service to new task definition
        if: env.ENV_NAME == 'prod'
        run: |
          aws ecs update-service \
              --cluster drawe-${{ env.ENV_NAME }}-cluster \
              --service drawe-${{ env.ENV_NAME }}-fastapi \
              --task-definition ${{ steps.register-td.outputs.td_arn }} \
              --region $AWS_REGION

      - name: Wait for deployment to stabilize
        if: env.ENV_NAME == 'prod'
        run: |
          ecs_wait() {
            aws ecs wait services-stable \
              --cluster drawe-${{ env.ENV_NAME }}-cluster \
              --services drawe-${{ env.ENV_NAME }}-fastapi \
              --region "$AWS_REGION"
          }
          ecs_wait || ecs_wait
          echo "✅ Deployment stable. New revision: ${{ steps.register-td.outputs.td_arn }}"
