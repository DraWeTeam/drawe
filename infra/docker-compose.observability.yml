# ⚠️ 오버레이 전용 — 반드시 docker-compose.local.yml 과 함께 사용한다.
#   docker compose -f docker-compose.local.yml \
#                  -f docker-compose.observability.yml up -d
#
# 각 서비스의 build/image 정의는 local.yml 에 있고, 이 파일은 환경변수만 덮어쓴다.
# 따라서 이 파일 단독으로는 build/image 가 없어 실행되지 않는다 — 의도된 구조다.
# (backend·fastapi·guide 세 블록 모두 environment 오버라이드만 갖는다)

# ── 로컬 관측 스택 오버레이 ────────────────────────────
# 사용:
#   docker compose \
#     -f docker-compose.local.yml \
#     -f docker-compose.observability.yml \
#     up -d
#
# Grafana UI: http://localhost:3000  (anonymous Admin)
# OTLP gRPC:  otel-lgtm:4317 (컴포즈 네트워크 내부)
#
# 백엔드/FastAPI 컨테이너의 OTEL_EXPORTER_OTLP_ENDPOINT 를 otel-lgtm 으로 덮어쓴다.
# 로컬엔 Alloy 사이드카가 없으므로 actuator scrape 는 작동 안 함 — Spring Boot
# 커스텀 metric 은 prod/dev 에서만 보인다. 단, OTel Java Agent 의 micrometer
# bridge 가 JVM/Hikari 등을 OTLP 로 같이 보내주므로 로컬 디버깅엔 충분.

services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.8.1
    container_name: drawe-otel-lgtm
    ports:
      - "127.0.0.1:3000:3000"   # Grafana
      - "127.0.0.1:4317:4317"   # OTLP gRPC (호스트에서도 직접 push 가능)
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - otel-lgtm-data:/data
    networks:
      - drawe-net

  backend:
    environment:
      # OTel Java Agent 가 자동으로 잡음 — agent 는 항상 attach 되어 있음
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: backend
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=drawe
      OTEL_TRACES_SAMPLER: always_on   # 로컬은 항상 100%
    depends_on:
      otel-lgtm:
        condition: service_started

  fastapi:
    environment:
      # §A 작업 (opentelemetry-distro 설치) 적용 후에만 효과
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: ai-server
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=drawe
      # 로그↔트레이스 상관: 앱 로거 포맷에 trace_id/span_id 주입(k8s configmap 과 동일 값).
      OTEL_PYTHON_LOG_FORMAT: "%(asctime)s %(levelname)s [%(name)s] trace_id:%(otelTraceID)s span_id:%(otelSpanID)s - %(message)s"
    depends_on:
      otel-lgtm:
        condition: service_started

  # guide 서비스도 로컬 관측 대상에 포함(기존엔 블록 자체가 없어 로컬-prod 정합이 깨져 있었음).
  #   fastapi 와 대칭 — OTLP 로 스팬을 otel-lgtm(Tempo)에 보내고 로그 포맷에 trace context 를 실어
  #   Grafana 에서 log→trace 점프까지 로컬에서 검증 가능하게 한다.
  guide:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: fastapi-guide
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local,service.namespace=drawe
      # 로그↔트레이스 상관: 앱 로거 포맷에 trace_id/span_id 주입(k8s configmap 과 동일 값).
      OTEL_PYTHON_LOG_FORMAT: "%(asctime)s %(levelname)s [%(name)s] trace_id:%(otelTraceID)s span_id:%(otelSpanID)s - %(message)s"
    depends_on:
      otel-lgtm:
        condition: service_started

volumes:
  otel-lgtm-data: