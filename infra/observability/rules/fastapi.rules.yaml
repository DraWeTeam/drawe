# =============================================================================
# fastapi-embed / fastapi-guide (OTel auto-instrument → OTLP → Alloy spanmetrics)
# 알림 룰 — Prometheus/Mimir rule-group 포맷
#
# 적재: dev → mimirtool rules load / prod → AMP ruler 업로드 (backend.rules.yaml 동일)
#
# 검증된 사실:
#   - 두 서비스 모두 `opentelemetry-instrument`로 기동(OTEL_METRICS_EXPORTER=otlp,
#     OTEL_SERVICE_NAME=fastapi-embed | fastapi-guide). /metrics 엔드포인트 없음.
#   - RED는 Alloy의 otelcol.connector.spanmetrics가 트레이스에서 생성:
#       * traces_spanmetrics_calls_total              (카운터)
#       * traces_spanmetrics_duration_milliseconds_bucket (히스토그램 → p95 가능)
#     라벨: service_name, span_name, status_code(span), 그리고 설정 디멘션
#           http_method, http_status_code, http_route.
#   - ⚠ 단위 접미사 확인 권장: 스토어에서
#       count by (__name__) ({__name__=~"traces_spanmetrics_duration.*"})
#     로 _milliseconds vs _seconds 확인 후 필요 시 치환.
# =============================================================================
groups:
  - name: drawe-fastapi-red
    rules:
      - alert: FastapiHigh5xxRate
        expr: |
          sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~"fastapi-.*",http_status_code=~"5.."}[5m]))
          /
          sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~"fastapi-.*"}[5m]))
          > 0.05
        for: 5m
        labels: { severity: warning, layer: app }
        annotations:
          summary: "{{ $labels.service_name }} 5xx 비율 5% 초과"
      - alert: FastapiHigh5xxRateCritical
        expr: |
          sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~"fastapi-.*",http_status_code=~"5.."}[5m]))
          /
          sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~"fastapi-.*"}[5m]))
          > 0.10
        for: 5m
        labels: { severity: critical, layer: app }
        annotations:
          summary: "{{ $labels.service_name }} 5xx 비율 10% 초과 (긴급)"
      # p95 지연 (ms). embed=CLIP 임베드, guide=CLIP(+LLM) 이라 임계는 서비스별 튜닝.
      - alert: FastapiHighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum by (service_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket{service_name=~"fastapi-.*"}[5m]))
          ) > 3000
        for: 10m
        labels: { severity: warning, layer: app }
        annotations:
          summary: "{{ $labels.service_name }} p95 지연 3s 초과 ({{ $value }}ms)"

  - name: drawe-fastapi-availability
    rules:
      # guide는 워밍업 중 /health 503 반환. 503이 오래 지속되면 워밍업 실패/멈춤.
      - alert: FastapiGuideWarmupStuck
        expr: |
          sum(rate(traces_spanmetrics_calls_total{service_name="fastapi-guide",http_status_code="503"}[5m])) > 0
        for: 15m
        labels: { severity: warning, service: fastapi-guide, layer: app }
        annotations:
          summary: "fastapi-guide 503(워밍업) 15분 지속 — 워밍업 점검"
      # 트래픽/트레이스 완전 소실(다운 가능성). idle 환경(dev 재우기)에선 오탐 → 주석.
      # - alert: FastapiNoTraffic
      #   expr: absent(traces_spanmetrics_calls_total{service_name="fastapi-guide"})
      #   for: 10m
      #   labels: { severity: warning, service: fastapi-guide, layer: app }
      #
      # 참고: liveness/readiness는 k8s probe(/health)가 1차 방어선이다.
      #       파드 단위 Pod NotReady/Restart 알림을 원하면 kube-state-metrics를
      #       파이프라인에 추가해야 한다(현재 미수집).

  # ─────────── 한 끗 가이드 파이프라인 (guide/_metrics.py 커스텀 OTel) ───────────
  # 위 RED 는 spanmetrics(HTTP 단위)라 "요청은 200인데 VLM/LLM 이 느리거나 폴백"인 상태를
  # 못 잡는다. 아래는 도메인 지표 3종(drawe_vlm / drawe_llm / drawe_image_gen)을 직접 본다.
  #
  # ⚠ 저볼륨 전제 — 임계·창 설계의 근거
  #   2026-07-22 prod AMP 실측(30일): coach 125 · plan 43 · VLM 32 · image_gen 6 회.
  #   시간당 1회 미만이라 위 RED 처럼 [5m]~[10m] 창을 쓰면 표본이 거의 0 →
  #   histogram_quantile 은 NaN, 비율식은 에러 1건이 곧 100% 로 튄다.
  #   그래서 (a) 창을 6h/24h/7d 로 넓히고 (b) 비율 대신 절대건수를 쓰고
  #   (c) 비율이 꼭 필요하면 최소볼륨 가드를 붙인다.
  #   같은 30일간 error·fallback 은 전 지표 0건이므로 소수 건수도 유의미한 신호다.
  #   ※ 트래픽이 늘면 창을 좁히고 임계를 비율식으로 되돌릴 것.
  #   ※ image_gen 은 표본이 가장 희소해 P95 룰을 두지 않고 에러 룰만 둔다(아래 삭제 사유 참조).
  - name: drawe-guide-pipeline
    rules:
      # 폴백은 "조용한 열화"다 — 키 부재/예외 시 LLM 없이 코치문이 나가므로 HTTP 는 200.
      # 실측 0건이라 1건도 이상 신호로 본다.
      - alert: GuideLlmFallback
        expr: |
          sum by (step) (increase(drawe_llm_latency_seconds_count{outcome="fallback"}[1h])) > 0
        for: 0m
        labels: { severity: warning, service: fastapi-guide, layer: ai }
        annotations:
          summary: "가이드 LLM 폴백 발생 (step={{ $labels.step }}) — 코치문 열화, API 키·예외 점검"
      - alert: GuideLlmErrors
        expr: |
          sum by (step) (increase(drawe_llm_latency_seconds_count{outcome="error"}[6h])) > 2
        for: 0m
        labels: { severity: warning, service: fastapi-guide, layer: ai }
        annotations:
          summary: "가이드 LLM 실패 6시간 내 3건 이상 (step={{ $labels.step }})"
      # ⚠ 이 룰은 "SLO 만족"이 아니라 "SLO 미달을 인지하고 회귀만 막는" 가드다.
      #   실측 30일 p95 coach 21.0s / p99 31.3s 로 이미 사용자 체감상 느린 상태이며,
      #   원인은 규명돼 있다 — plan/select/coach 가 Grok 을 순차로 3회 호출한다.
      #   SLO 기준(체감 한계 ~15-20s)으로 임계를 잡으면 상시 발화하므로, 레이턴시 개선
      #   (순차→병렬 등) 전까지는 "더 나빠지는 것"만 잡는다. 개선 후 SLO 기준으로 재조정할 것.
      #   임계 55s = drawe_llm_latency 버킷 경계(…,34,55,90). 24h 창에서 coach p95 가
      #   31.7s 까지 흔들리므로 45s 로 두면 오탐(간격 1.4배), 55s 가 회귀 신호로 적정.
      #   창 24h 는 표본 확보용(coach ~4.2회/일) — 더 좁히면 NaN. plan(평상 12.8s)은 단일
      #   임계라 4배 악화까지 안 잡힌다 → 촘촘히 보려면 step 별로 쪼갤 것(표본 쌓인 뒤).
      - alert: GuideLlmSlowP95
        expr: |
          histogram_quantile(0.95,
            sum by (step, le) (rate(drawe_llm_latency_seconds_bucket[24h]))
          ) > 55
        for: 1h
        labels: { severity: warning, service: fastapi-guide, layer: ai }
        annotations:
          summary: "가이드 LLM p95 55s 초과 (step={{ $labels.step }}, {{ $value }}s) — SLO 미달 회귀 가드"
          description: >-
            SLO 만족을 뜻하지 않는다. coach 는 실측 p95 21s / p99 31s 로 이미 느리며(원인:
            Grok 순차 3회 호출), 이 룰은 그보다 더 나빠지는 회귀만 잡는다. 레이턴시 개선 후
            SLO 기준(체감 한계 ~15-20s)으로 임계를 재조정할 것.
      - alert: GuideVlmErrors
        expr: |
          sum by (model) (increase(drawe_vlm_latency_seconds_count{outcome="error"}[6h])) > 2
        for: 0m
        labels: { severity: warning, service: fastapi-guide, layer: ai }
        annotations:
          summary: "가이드 VLM 실패 6시간 내 3건 이상 (model={{ $labels.model }})"
      # 실측 p95 4.5s / 30일(24h 창으로는 2.9s). 임계 21s = 버킷 경계(회귀 가드), 관측 p95 4.1s.
      #   drawe_vlm_latency 버킷은 (…,13,21,34,60) 이라 15 는 13~21 사이 보간값이었다 →
      #   실제 경계 21 로 정렬해 histogram_quantile 보간 오차를 없앤다.
      #   더 민감하게 가려면 13 으로 조정 가능(단 관측 p95 4.1s 와의 헤드룸이 3배로 줄어 오탐↑).
      # 창이 7d 인 이유: VLM 은 ~1.1회/일이라 24h 창이 자주 비어 룰이 NaN 이 된다.
      - alert: GuideVlmSlowP95
        expr: |
          histogram_quantile(0.95,
            sum by (model, le) (rate(drawe_vlm_latency_seconds_bucket[7d]))
          ) > 21
        for: 1h
        labels: { severity: warning, service: fastapi-guide, layer: ai }
        annotations:
          summary: "가이드 VLM p95 21s 초과 ({{ $value }}s) — 모델·리전 점검"
      # image_gen 은 P95 룰 없이 에러 룰만 둔다 — 아래 삭제 사유 참조.
      # 이 에러 룰이 image_gen 의 실효 방어선이며, 트래픽이 늘면 자동으로 유효해진다.
      - alert: ImageGenErrors
        expr: |
          sum by (provider) (increase(drawe_image_gen_latency_seconds_count{outcome="error"}[6h])) > 1
        for: 0m
        labels: { severity: warning, service: fastapi-guide, layer: ai }
        annotations:
          summary: "레퍼런스 이미지 생성 실패 6시간 내 2건 이상 (provider={{ $labels.provider }})"
      # ⓧ ImageGenSlowP95 는 이번 PR 에서 제거함 (2026-07-22).
      #   사유: drawe_image_gen_latency 는 표본이 희소하다(생성 0.2회/일 → instant 질의에
      #   시리즈조차 없음). 7d 창 rate 도 대부분 비어 histogram_quantile 이 상시 NaN 이고,
      #   임계 30s 도 버킷(…,21,34,…) 사이 보간값이라 방어선이 성립하지 않는다.
      #   데이터가 쌓이면 버킷 경계값(예: 34)으로 재도입 가능. 그때까지는 ImageGenErrors 가 방어선.
