apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-guide
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/DraWeTeam/drawe.git
    targetRevision: feature/eks-migration
    path: infra/k8s/overlays/dev/fastapi-guide
  destination:
    server: https://kubernetes.default.svc
    namespace: drawe-dev
  # ESO 웹훅이 채우는 기본값 필드 무시 (backend 와 동일)
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
