apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/DraWeTeam/drawe.git
    targetRevision: develop
    path: infra/k8s/overlays/dev/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: drawe-dev
  # ── ESO 웹훅이 자동으로 채우는 기본값 필드는 drift 로 보지 않음 ──
  #   data[].remoteRef: conversionStrategy=Default / decodingStrategy=None / metadataPolicy=None
  #   target.deletionPolicy: Retain (기본값)
  #   git 매니페스트엔 없고 라이브에만 생겨서 영구 OutOfSync 가 됨 → 무시.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # selfHeal 이 위 ignoreDifferences 무시 필드를 되돌리지 않게 함 (필수)
      - RespectIgnoreDifferences=true
