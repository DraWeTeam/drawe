apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-guide
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/DraWeTeam/drawe.git
    targetRevision: main
    path: infra/k8s/overlays/prod/fastapi-guide
  destination:
    server: https://kubernetes.default.svc
    namespace: drawe-prod
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
