apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

# prod = self-host LGT + AMP.
#   neutral base(Alloy 수집/RBAC/SA/Service) + self-host 스택(Loki/Tempo/Grafana).
resources:
  - ../../../base/observability
  - loki.yaml
  - tempo.yaml
  - grafana.yaml
  - grafana-externalsecret.yaml
  - grafana-sgp.yaml

# config 파일들을 CM 으로 생성. disableNameSuffixHash → 이름 고정(volume 참조 일치).
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: drawe-observability
configMapGenerator:
  - name: alloy-config            # Alloy prod(self-host) 설정
    files:
      - config.alloy
  - name: loki-config             # Loki monolithic 설정
    files:
      - loki-config.yaml
  - name: tempo-config            # Tempo monolithic 설정
    files:
      - tempo-config.yaml
  - name: grafana-datasources     # Grafana datasource provisioning
    files:
      - datasources.yaml=grafana-datasources.yaml

patches:
  # ① alloy SA → AMP RemoteWrite IRSA
  - target:
      kind: ServiceAccount
      name: alloy
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          # 3-platform output: obs_alloy_role_arn
          eks.amazonaws.com/role-arn: arn:aws:iam::933832340498:role/drawe-prod-obs-alloy

  # ② alloy DaemonSet → self-host export 에 필요한 env 주입
  #    AMP_REMOTE_WRITE_URL 은 terraform output `amp_remote_write_url` 값으로 교체
  - target:
      kind: DaemonSet
      name: alloy
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: alloy
      spec:
        template:
          spec:
            containers:
              - name: alloy
                env:
                  - name: NODE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                  # ★ terraform output amp_remote_write_url 로 교체
                  #   (예: https://aps-workspaces.ap-northeast-2.amazonaws.com/workspaces/ws-xxxx/api/v1/remote_write)
                  - name: AMP_REMOTE_WRITE_URL
                    value: https://aps-workspaces.ap-northeast-2.amazonaws.com/workspaces/ws-83bd44f3-7f62-4320-bcd0-ab8b420dc020/api/v1/remote_write
                  - name: AWS_REGION
                    value: ap-northeast-2

# 운영 전 Alloy 버전 핀 권장 (Docker Hub: grafana/alloy 태그 확인 후 주석 해제):
# images:
