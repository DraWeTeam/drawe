# Grafana admin / DB 자격증명을 SSM 에서 K8s Secret 으로 동기화 (ESO).
# ClusterSecretStore(aws-ssm)는 3-platform(modules/eks-platform) 이 생성.
# SSM 파라미터(기존 ECS prod 스택이 이미 생성 — terraform-prod/ssm.tf):
#   /drawe/prod/grafana-admin-password   (random_password)
#   /drawe/prod/db-password / db-username (RDS master)
# envFrom 으로 Grafana 컨테이너에 주입되는 키 이름 = Grafana 환경변수명.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-secrets
  namespace: observability
  labels:
    app: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: grafana-secrets
    creationPolicy: Owner
  data:
    - secretKey: GF_SECURITY_ADMIN_PASSWORD
      remoteRef:
        key: /drawe/prod/grafana-admin-password
    - secretKey: GF_DATABASE_PASSWORD
      remoteRef:
        key: /drawe/prod/db-password
    - secretKey: GF_DATABASE_USER
      remoteRef:
        key: /drawe/prod/db-username
