apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: drawe-prod

resources:
  - ../../../base/fastapi-embed

images:
  - name: drawe-fastapi
    newName: 933832340498.dkr.ecr.ap-northeast-2.amazonaws.com/drawe-prod-fastapi
