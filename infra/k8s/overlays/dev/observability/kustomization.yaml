apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability

# dev = Grafana Cloud. neutral base + Grafana Cloud 자격증명/패치/설정을 여기서 소유.
resources:
  - ../../../base/observability
  - externalsecret.yaml          # Grafana Cloud 자격증명 (base 에서 이동)

# ── alloy-config CM (dev = Grafana Cloud export) ──
# [변경] backend-actuator-scrape.alloy 를 추가해 두 파일을 한 CM 에 담는다.
#        Alloy 가 `run /etc/alloy/` (디렉터리)로 두 파일을 단일 config 로 병합한다.
# disableNameSuffixHash=true → 이름 'alloy-config' 고정(daemonset volume 참조와 일치).
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: drawe-observability
configMapGenerator:
  - name: alloy-config
    files:
      - config.alloy
      - backend-actuator-scrape.alloy   # [추가] EKS 전용 backend 스크랩 (ECS 와 분리)

# DaemonSet 패치: dev 전용 env + Grafana Cloud 자격증명 + [변경] 디렉터리 로드 args.
# env 는 name 기준 strategic-merge. args 는 list(merge key 없음) → 전체 교체이므로
# base 의 args 전체를 다시 명시하되 config 경로만 파일→디렉터리로 바꾼다.
patches:
  - target:
      kind: DaemonSet
      name: alloy
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: alloy
      spec:
        template:
          spec:
            containers:
              - name: alloy
                args:
                  - run
                  - /etc/alloy/                         # [변경] 파일→디렉터리: config.alloy + backend-actuator-scrape.alloy 병합 로드
                  - --server.http.listen-addr=0.0.0.0:12345
                  - --storage.path=/tmp/alloy
                env:
                  - name: ALLOY_DEPLOY_ENV
                    value: "dev"
                  - name: ALLOY_SAMPLING_RATE
                    value: "100"
                envFrom:
                  - secretRef:
                      name: alloy-grafana-cloud

# 운영 전 Alloy 버전 핀 권장:
# images:
#   - name: grafana/alloy
