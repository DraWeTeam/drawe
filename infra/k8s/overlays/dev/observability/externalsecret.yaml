# Grafana Cloud 자격증명을 SSM 에서 K8s Secret 으로 동기화 (ESO).
# ClusterSecretStore(aws-ssm)는 3-platform 에서 만든 것. ESO 의 IRSA 가 SSM 을 읽는다.
# SSM 파라미터(기존 ECS 와 동일):
#   /drawe/dev/grafana-otlp-endpoint, /drawe/dev/grafana-instance-id, /drawe/dev/grafana-cloud-token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alloy-grafana-cloud
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: alloy-grafana-cloud
    creationPolicy: Owner
  data:
    - secretKey: GRAFANA_OTLP_ENDPOINT
      remoteRef:
        key: /drawe/dev/grafana-otlp-endpoint
    - secretKey: GRAFANA_CLOUD_INSTANCE_ID
      remoteRef:
        key: /drawe/dev/grafana-instance-id
    - secretKey: GRAFANA_CLOUD_TOKEN
      remoteRef:
        key: /drawe/dev/grafana-cloud-token
