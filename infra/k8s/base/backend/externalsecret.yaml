apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  labels:
    app: backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm            # 플랫폼이 만든 ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: drawe-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef: { key: /drawe/dev/db-username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: /drawe/dev/db-password }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: /drawe/dev/redis-password }
    - secretKey: JWT_SECRET
      remoteRef: { key: /drawe/dev/jwt-secret }
    - secretKey: GROK_API_KEY
      remoteRef: { key: /drawe/dev/grok-api-key }
    - secretKey: CLAUDE_API_KEY
      remoteRef: { key: /drawe/dev/claude-api-key }
    - secretKey: GEMINI_API_KEY
      remoteRef: { key: /drawe/dev/gemini-api-key }
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef: { key: /drawe/dev/google-client-id }
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef: { key: /drawe/dev/google-client-secret }
    - secretKey: PINECONE_API_KEY
      remoteRef: { key: /drawe/dev/pinecone-api-key }
    - secretKey: PINECONE_HOST
      remoteRef: { key: /drawe/dev/pinecone-host }
    - secretKey: PINECONE_INDEX
      remoteRef: { key: /drawe/dev/pinecone-index }
    - secretKey: BRIA_API_KEY
      remoteRef: { key: /drawe/dev/bria-api-key }
    - secretKey: BRIA_BASE_URL
      remoteRef: { key: /drawe/dev/bria-base-url }
    - secretKey: ADMIN_PASSWORD
      remoteRef: { key: /drawe/dev/admin-password }
    - secretKey: GA4_SA_KEY_JSON
      remoteRef: { key: /drawe/dev/ga4-sa-key }
    - secretKey: SMTP_USERNAME
      remoteRef: { key: /drawe/dev/smtp-username }
    - secretKey: SMTP_PASSWORD
      remoteRef: { key: /drawe/dev/smtp-password }
