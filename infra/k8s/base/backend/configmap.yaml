apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend
data:
  SERVER_PORT: "8080"
  DB_PORT: "3306"
  DB_NAME: "drawe_db"
  DB_SSL_MODE: "VERIFY_IDENTITY"
  REDIS_PORT: "6379"
  JPA_DDL_AUTO: "update"
  JPA_SHOW_SQL: "false"
  LOG_LEVEL_SQL: "warn"
  # 같은 네임스페이스(drawe-dev) 내 서비스 → 짧은 이름으로 해석 (환경 무관)
  FASTAPI_URL: "http://fastapi-embed:8000"
  FASTAPI_GUIDE_URL: "http://fastapi-guide:8000"
  # ── OTEL → Alloy DaemonSet(observability ns) gRPC 진입점 ──
  OTEL_SERVICE_NAME: "backend"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.observability.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  # ── 로그↔트레이스 상관: 로그 패턴에 MDC trace context 출력 ──
  # OTel agent(2.29)가 MDC 에 trace_id/span_id(snake_case)를 넣지만 기본 Spring 콘솔
  # 패턴이 %X 를 안 찍어 stdout·Loki 에 미출력이었다. 구분자는 ':' — Grafana Loki
  # datasource 의 derivedFields matcherRegex(trace_id["\s:]+([a-f0-9]+))와 일치시켜
  # 로그→트레이스 자동 점프가 되게 한다('=' 는 그 regex 에 매칭 안 됨).
  # base 라 dev/prod 공용 — dev 는 teardown 상태로 복구 시 자동 반영된다.
  LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} trace_id:%X{trace_id} span_id:%X{span_id} - %msg%n"
  # graceful shutdown: 30s < terminationGracePeriodSeconds(60s)
  SERVER_SHUTDOWN: "graceful"
  SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: "30s"
