apiVersion: v1
kind: Service
metadata:
  name: fastapi-embed                  # backend 가 http://fastapi-embed:8000 로 호출 → 이름 고정
  labels:
    app: fastapi-embed
spec:
  type: ClusterIP                      # 내부 전용 (외부 노출 없음)
  selector:
    app: fastapi-embed
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
