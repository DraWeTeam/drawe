apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-embed-config
  labels:
    app: fastapi-embed
data:
  # main.py 가 읽는 값 (env 무관 고정)
  CLIP_MODEL_NAME: "openai/clip-vit-large-patch14"
  DEVICE: "cpu"                       # EKS 노드는 CPU(arm64 Graviton)
  # ── OTEL → Alloy DaemonSet(observability ns) ──
  OTEL_SERVICE_NAME: "fastapi-embed"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.observability.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  # 로그↔트레이스 상관: 앱 로그에 trace context 출력. main.py 가 이 포맷으로 root 로깅을
  # basicConfig(force) 설정해 otelTraceID/otelSpanID 를 찍는다(auto-instrument 의 중복
  # instrument 는 no-op 이라 env·set_logging_format 만으론 무효 — 실측).
  # 구분자 ':' — grafana Loki derivedFields matcherRegex(trace_id["\s:]+([a-f0-9]+))와 일치.
  OTEL_PYTHON_LOG_FORMAT: "%(asctime)s %(levelname)s [%(name)s] trace_id:%(otelTraceID)s span_id:%(otelSpanID)s - %(message)s"
