apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guide-secrets
  labels:
    app: fastapi-guide
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: drawe-guide-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_DSN
      remoteRef: { key: /drawe/dev/artref-db-dsn }      # mysql+pymysql://...@drawe-dev-mysql:3306/drawe_guide
    - secretKey: QDRANT_URL
      remoteRef: { key: /drawe/dev/qdrant-url }
    - secretKey: QDRANT_API_KEY
      remoteRef: { key: /drawe/dev/qdrant-api-key }
    - secretKey: XAI_API_KEY
      remoteRef: { key: /drawe/dev/grok-api-key }
    - secretKey: GEMINI_API_KEY
      remoteRef: { key: /drawe/dev/gemini-api-key }
