apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-guide
  labels:
    app: fastapi-guide
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-guide
  template:
    metadata:
      labels:
        app: fastapi-guide
    spec:
      serviceAccountName: fastapi-guide          # IRSA → artref S3 RW
      # uvicorn graceful-shutdown 110s + 버퍼 → 130s (spot 2분 통지 시 in-flight 마무리)
      terminationGracePeriodSeconds: 130
      # 파드 레벨 보안 컨텍스트 — 이미지(USER drawe 1000:1000)와 정합.
      # ⚠️ 비루트 이미지(Dockerfile.guide 수정본)를 ECR 에 푸시한 뒤에 적용할 것.
      #    root 이미지 상태에서 적용하면 "runAsNonRoot and image will run as root" 로 기동 거부됨.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fastapi-guide
          image: drawe-fastapi-guide:latest      # overlay images: 가 실제 ECR 로 치환
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            # readOnlyRootFilesystem 은 OpenCLIP/HF 캐시·mediapipe 임시파일 쓰기 때문에 미적용
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fastapi-guide-config         # base 고정 env
            - configMapRef:
                name: fastapi-guide-env            # overlay 환경별 env
            - secretRef:
                name: drawe-guide-secrets          # ESO 가 SSM 에서 동기화
          # /health: 워밍업 미완 503(loading) → 완료 200(ok), draining 503.
          #   외부 의존성(DB/Qdrant) 체크 없음 → liveness 안전. 모델 로드 무거움 → startup 넉넉히.
          startupProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30                   # 최대 300초 — open_clip+mediapipe 워밍업 여유
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "1500m"
              memory: "5Gi"                        # ECS guide_memory=5120 과 동일 헤드룸
            limits:
              memory: "6Gi"                        # OOM 방지. CPU limit 미설정(추론 스로틀 방지)