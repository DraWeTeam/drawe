# ── 로컬 개발 환경 (전체 스택) ────────────────────────────
# docker compose -f docker-compose.local.yml up -d
#
# 호스트 포트 (기본값 — 충돌 시 env 로 override 가능):
#   3306 — MySQL    (MYSQL_PORT)
#   6379 — Valkey   (REDIS_PORT)
#   8080 — Backend  (BACKEND_PORT)    ← Spring Boot
#   8000 — FastAPI  (FASTAPI_PORT)    ← CLIP Embedding
#   5173 — Frontend (Vite dev server — 별도 실행)
#
# 포트 충돌 시 .env 또는 셸에서:  export BACKEND_PORT=28080  (등)
# 컨테이너 내부 포트와 compose 내부 통신(mysql:3306 등)은 불변 — 호스트 바인딩만 가변.

services:
  mysql:
    image: mysql:8.4
    container_name: drawe-mysql
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: drawe_db
      MYSQL_USER: ${DB_USERNAME:-drawe_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-drawe_pass}
    volumes:
      - mysql-data:/var/lib/mysql
      # 가이드 서비스용 artref DB + 스키마 자동 적용(최초 1회). 반영하려면 down -v 후 up.
      - ./local-init/00-init-artref.sh:/docker-entrypoint-initdb.d/00-init-artref.sh:ro
      - ./local-init/artref-schema.sql:/schema/artref-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      retries: 10
    networks:
      - drawe-net

  valkey:
    image: valkey/valkey:8.1.6-alpine
    container_name: drawe-valkey
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: ["valkey-server", "--requirepass", "${REDIS_PASSWORD:-valkey_pass}", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD:-valkey_pass}", "PING"]
      interval: 5s
      retries: 10
    networks:
      - drawe-net

  backend:
    build:
      context: ../backend
    container_name: drawe-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: drawe_db
      DB_USERNAME: ${DB_USERNAME:-drawe_user}
      DB_PASSWORD: ${DB_PASSWORD:-drawe_pass}
      # DB_SSL_MODE 미설정 시 application.properties default(PREFERRED) 사용 — 로컬 docker MySQL OK
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-valkey_pass}
      JWT_SECRET: ${JWT_SECRET:-bG9jYWxkZXZlbG9wbWVudHNlY3JldGtleWZvcmRyYXdlcHJvamVjdDEyMzQ1Njc4OTA=}
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "true"
      LOG_LEVEL_SQL: debug
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
      FASTAPI_URL: http://fastapi:8000          # ← 앱은 fastapi.url=${FASTAPI_URL} 을 읽음 (BASE_URL 아님)
      FASTAPI_GUIDE_URL: http://guide:8000      # ← backend→guide 서버간 통신(컨테이너명:내부포트)
      FASTAPI_GUIDE_PUBLIC_URL: http://localhost:8001  # ← 브라우저가 레퍼런스 이미지 여는 주소(호스트)
      GROK_API_KEY: ${GROK_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BRIA_API_KEY: ${BRIA_API_KEY:-}           # ← application.properties 의 bria.api-key (기본값 없음 → 비어도 set)
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}   # ← 백엔드도 Pinecone 직접 사용 (fastapi 와 별개)
      PINECONE_HOST: ${PINECONE_HOST:-}
      PINECONE_INDEX: ${PINECONE_INDEX:-drawe-images}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APP_OAUTH2_REDIRECT_URI: http://localhost:5173/oauth/callback
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - drawe-net

  fastapi:
    build:
      context: ../fastapi
    container_name: drawe-fastapi
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      PORT: 8000
      WORKERS: 1
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
    networks:
      - drawe-net

  # 한 끗 가이드(이미지 가이딩) 서비스 — backend 가 FASTAPI_GUIDE_URL 로 호출. 내부 8000 → 호스트 8001.
  guide:
    build:
      context: ../fastapi
      dockerfile: Dockerfile.guide
    container_name: drawe-guide
    ports:
      - "${GUIDE_PORT:-8001}:8000"
    environment:
      # artref DB(스키마는 mysql init 으로 적용). 로컬은 root 접속.
      DB_DSN: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-rootpass}@mysql:3306/drawe_guide
      # 레퍼런스 벡터검색 — Qdrant Cloud(dev,768-dim) 또는 로컬 qdrant 를 .env 로 주입.
      #   EMBEDDING_MODEL 은 그 컬렉션 차원과 반드시 일치(Cloud dev=ViT-L-14/768).
      VECTOR_BACKEND: qdrant
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-reference_images_dev}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-open_clip:ViT-L-14:openai}
      LLM_PROVIDER: grok
      XAI_API_KEY: ${GROK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # VLM 모델 — vertex 백엔드는 무료 20/day 한도가 없어 flash 직접 사용 가능. aistudio 폴백 시 flash-lite.
      GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      # VLM 백엔드: vertex(GCP 프로젝트 quota·크레딧, 20/day 없음) | aistudio(GEMINI_API_KEY, 무료 20/day).
      #   vertex 는 ADC(/secrets/adc.json) + 프로젝트로 인증. adc.json 만료/없으면 호출이 조용히 None 폴백.
      VLM_BACKEND: ${VLM_BACKEND:-vertex}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-project-761a4dff-7717-4f75-a4a}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/adc.json
      # 레퍼런스 이미지(S3/MinIO). 비우면 썸네일 없이 코칭만 동작.
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_KEY: ${S3_KEY:-}
      S3_SECRET: ${S3_SECRET:-}
      S3_BUCKET: ${S3_BUCKET:-artref}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:8001}
      HAND_VLM: "1"
      HAND_AUTO: "1"
      CORS_ORIGINS: http://localhost:5173
      TRACE_CTX: "1"
      SUBJECT_VLM: "1"
      STYLE_VLM: "1"
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-valkey_pass}
    volumes:
      # vertex 백엔드 ADC 자격증명(읽기전용). .secrets/ 는 gitignore 됨.
      - ./.secrets/adc.json:/secrets/adc.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - drawe-net

volumes:
  mysql-data:

networks:
  drawe-net:
    driver: bridge