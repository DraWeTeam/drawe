<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="value_compression_distance">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .accd  { fill:none; stroke:#2f6df0;  stroke-width:2; stroke-dasharray:6 5; }
    .dot   { fill:#e0533d; stroke:none; }
    .adot  { fill:#2f6df0; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide">
    <rect class="guide" x="40" y="40" width="400" height="300"/>
  </g>
  <g id="construction">
    <rect x="70" y="120" width="90" height="160" fill="#2b2b2b"/>
    <rect x="70" y="120" width="90" height="44" fill="#ededed"/>
    <rect x="300" y="170" width="80" height="110" fill="#a7adb5"/>
    <rect x="300" y="170" width="80" height="34" fill="#c2c7cd"/>
  </g>
  <g id="label">
    <text class="lbl" x="66" y="306">가까이 — 넓은 명도</text>
    <text class="lbl" x="288" y="306">멀리 — 좁은 명도</text>
    <rect x="70" y="356" width="160" height="18" fill="url(#gA)"/>
    <rect x="300" y="356" width="110" height="18" fill="#aeb4bb"/>
    <text class="cap" x="20" y="402">가까이는 가장 어둡고 밝은 끝까지, 멀리는 중간톤으로 좁혀진다 — 대비가 줄며 물러난다.</text>
    <text class="cap" x="20" y="424">(아래 막대: 명도 범위가 거리에 따라 좁아짐)</text>
  </g>
  <defs><linearGradient id="gA" x1="0" x2="1"><stop offset="0" stop-color="#222"/><stop offset="1" stop-color="#f2f2f2"/></linearGradient></defs>
</svg>
