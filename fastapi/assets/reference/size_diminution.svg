<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="size_diminution">
  <style>
    .guide { fill:none; stroke:#c7ccd4; stroke-width:2.5; }
    .gfill { fill:#c7ccd4; opacity:.18; stroke:none; }
    .cons  { fill:none; stroke:#e0533d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .consd { fill:none; stroke:#e0533d; stroke-width:2; stroke-dasharray:6 5; }
    .acc   { fill:none; stroke:#2f6df0;  stroke-width:2.5; stroke-linecap:round; }
    .accd  { fill:none; stroke:#2f6df0;  stroke-width:2; stroke-dasharray:6 5; }
    .dot   { fill:#e0533d; stroke:none; }
    .adot  { fill:#2f6df0; stroke:none; }
    .lbl   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:14px; }
    .cap   { fill:#3a3f47; font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; font-size:13px; opacity:.8; }
    .tag   { fill:#e0533d; font-family:sans-serif; font-size:12px; font-weight:600; }
  </style>
  <g id="guide">
    <line class="guide" x1="20" y1="180" x2="460" y2="180"/>
    <circle class="dot" cx="300" cy="180" r="4"/>
    <line class="guide" stroke-dasharray="6 5" x1="300" y1="180" x2="60" y2="400"/>
    <line class="guide" stroke-dasharray="6 5" x1="300" y1="180" x2="60" y2="250"/>
  </g>
  <g id="construction">
    <g class="cons">
      <line x1="80" y1="400" x2="80" y2="262"/><path d="M80 262 q-34 0 0 -46 q34 0 0 46" fill="#a1a6ae"/>
      <line x1="150" y1="356" x2="150" y2="258"/><path d="M150 258 q-24 0 0 -33 q24 0 0 33" fill="#a1a6ae"/>
      <line x1="210" y1="322" x2="210" y2="252"/><path d="M210 252 q-17 0 0 -24 q17 0 0 24" fill="#a1a6ae"/>
      <line x1="258" y1="296" x2="258" y2="248"/><path d="M258 248 q-12 0 0 -17 q12 0 0 17" fill="#a1a6ae"/>
    </g>
  </g>
  <g id="label">
    <text class="lbl" x="306" y="170">소실점</text>
    <text class="tag" x="60" y="424">같은 크기 → 멀수록 작게</text>
    <text class="cap" x="20" y="462">같은 크기 물체가 멀수록 작아지는 정도가 거리감을 만든다.</text>
  </g>
</svg>
