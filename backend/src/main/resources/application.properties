spring.application.name=drawe-backend
server.port=${SERVER_PORT:8080}

# ── Profiles (로컬 비밀 분리) ───────────────────────────────
# application-oauth.properties (OAuth Google client) / application-llm.properties (LLM API keys)
# 두 파일은 .gitignore 처리되어 있고, hardcode 된 값을 들고 있어 메인의 ${...} placeholder 를 덮어씀.
# docker / ECS 환경에서는 SPRING_PROFILES_ACTIVE 로 override 가능 (include 는 단순 추가).
spring.profiles.include=oauth,llm

# ── Forwarded Headers (Cloudflare → ALB → ECS) ─────────────
# CF 가 X-Forwarded-Proto: https 를 prepend → OAuth redirect URI 에 https:// 자동 적용
server.forward-headers-strategy=native

# ── DataSource ──────────────────────────────────────────────
# sslMode=${DB_SSL_MODE} — 로컬은 PREFERRED (env 미설정 시 default), ECS 는 VERIFY_IDENTITY
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:drawe_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&sslMode=${DB_SSL_MODE:PREFERRED}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP (DB connection pool) ───────────────────────────
# Multi-AZ failover, NAT idle drop, pool 고갈 모두 대응
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.pool-name=DraweHikariCP

# ── Redis (Valkey) ──────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# ── Spring Session (Valkey 공유 세션) ───────────────────────
# 멀티 파드(EKS replica 2+)에서 OAuth2 authorization request(state)를 Valkey 에 저장.
# → 인증 시작(파드 A)과 구글 콜백(파드 B)이 갈려도 세션 유지. 없으면 /login?error → 500.
# spring-session-data-redis 의존성이 있으면 RedisHttpSession 자동 구성됨(store-type 불필요).
spring.session.timeout=${SESSION_TIMEOUT:30m}
spring.session.redis.namespace=drawe:session
spring.session.redis.flush-mode=immediate

# ── JPA ─────────────────────────────────────────────────────
# dev: update (default) — entity 변경 시 Hibernate 자동 ALTER
# prod: validate (ECS task env 가 override) — Flyway 가 실제 DDL 담당
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
# ⚠ 절대 prod 에서 true 로 두지 말 것 — log 폭증 + PII 누출
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
# ⚠ open-in-view=false — DB connection 점유 시간 최소화 (풀 고갈 방지)
spring.jpa.open-in-view=false

# ── Flyway — schema migration ───────────────────────────────
# prod 에서 JPA_DDL_AUTO=validate 와 함께 사용:
#   1) Flyway 가 DB 스키마를 V1, V2, ... 순으로 적용
#   2) Hibernate 는 entity ↔ 적용된 스키마가 일치하는지 검증만 함
#
# baseline-on-migrate=true: 이미 테이블이 있는 DB 에 처음 Flyway 도입 시
#   V1 (baseline) 을 "이미 적용된 것" 으로 간주.
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
# baseline-version=1: V1을 baseline으로 마킹.
# 빈 DB → V1 SQL 실제 실행으로 스키마 생성.
# 이미 테이블 있는 DB → baseline-on-migrate으로 V1을 "이미 적용"으로 마킹.
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline_schema
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ── Logging ─────────────────────────────────────────────────
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:warn}
logging.level.org.hibernate.type.descriptor.sql=warn
logging.level.org.flywaydb=${LOG_LEVEL_FLYWAY:info}

# ── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── LLM APIs ────────────────────────────────────────────────
## Gemini (Google AI Studio)
llm.gemini.api-key=${GEMINI_API_KEY}
llm.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
llm.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

## Grok (xAI)
llm.grok.api-key=${GROK_API_KEY}
llm.grok.model=${GROK_MODEL:grok-4-fast-non-reasoning}
llm.grok.base-url=${GROK_BASE_URL:https://api.x.ai/v1}

## Claude (Anthropic)
llm.claude.api-key=${CLAUDE_API_KEY}
llm.claude.model=${CLAUDE_MODEL:claude-sonnet-4-6}
llm.claude.base-url=${CLAUDE_BASE_URL:https://api.anthropic.com/v1}

## 공통 옵션
llm.timeout-ms=${LLM_TIMEOUT_MS:60000}
llm.max-history=${LLM_MAX_HISTORY:20}
llm.default-provider=${LLM_DEFAULT_PROVIDER:gemini}

# ── OAuth ───────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
# OAuth Redirect (프론트엔드 콜백 페이지)
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}

# ── FastAPI internal endpoint ───────────────────────────────
# Service Connect (드로우용 ECS Service Connect) 가 fastapi.drawe-{env}.local:8000 을 만듦.
# 환경변수 FASTAPI_URL 로 ECS task definition 이 주입.
fastapi.url=${FASTAPI_URL:http://localhost:8000}

# ── Pinecone ────────────────────────────────────────────────
pinecone.api-key=${PINECONE_API_KEY}
pinecone.host=${PINECONE_HOST}
pinecone.index-name=${PINECONE_INDEX}

# ── Bria AI (이미지 생성) ───────────────────────────────────
# 채팅에서 레퍼런스 검색 결과가 없을 때 사용자가 요청하면 Bria 로 이미지 생성.
bria.api-key=${BRIA_API_KEY}
bria.base-url=${BRIA_BASE_URL:https://engine.prod.bria-api.com}

# ── Actuator (Health probes / Metrics / Flyway) ─────────────
# Flyway 도 health check 에 포함 — DB 마이그레이션 실패 시 readiness DOWN
management.endpoints.web.exposure.include=health,info,prometheus,flyway
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,redis
management.metrics.tags.application=drawe-backend
management.metrics.tags.environment=${SPRING_PROFILES_ACTIVE:dev}

# Redis TLS (ElastiCache TransitEncryptionEnabled=true)
spring.data.redis.ssl.enabled=${REDIS_TLS:false}

# Admin Dashboard Credentials
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD}

# Admin Cost 탭 — LLM 토큰 단가 (USD, 1M 토큰당). key = provider 이름(소문자).
# 미설정 시 토큰/호출 수는 그대로 집계되고 비용만 "—"로 표기된다.
# 비용 표시를 켜려면 아래 주석을 풀고 각 provider 콘솔의 실제 단가를 넣을 것.
# (빈 문자열은 BigDecimal 바인딩 에러를 내므로, 쓸 값만 주석 해제할 것.)
#admin.cost.pricing.claude.input-per-1m=3.00
#admin.cost.pricing.claude.output-per-1m=15.00
admin.cost.pricing.grok.input-per-1m=0.20
admin.cost.pricing.grok.output-per-1m=0.50
#admin.cost.pricing.gemini.input-per-1m=0.10
#admin.cost.pricing.gemini.output-per-1m=0.40

admin.ga4.property-id=${GA4_PROPERTY_ID:535124915}
admin.ga4.sa-key-json=${GA4_SA_KEY_JSON:}

# ── FastAPI guide service (별도 ECS 서비스, Service Connect) ──
# fastapi-guide.drawe-{env}.local:8000. env FASTAPI_GUIDE_URL 주입. dev 로컬은 8001.
fastapi.guide.url=${FASTAPI_GUIDE_URL:http://localhost:8001}
# 레퍼런스 이미지 브라우저 도달용 base
fastapi.guide.public-url=${FASTAPI_GUIDE_PUBLIC_URL:http://localhost:8001}
# 멀티파트 한도 상향 — 드로잉 업로드용. 전역 설정이라 ImageController에도 적용(작은 파일 영향 없음, 안전한 확장)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:15MB}

logging.level.com.drawe.backend.domain.llm.service.GrokService=DEBUG

# ── google Gmail SMTP 이메일 전송
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ════════════════════════════════════════════════════════════
# AI 파이프라인 트랙 A (드로우 가이드 챗) — drawe-backend 에서 이관
# ════════════════════════════════════════════════════════════
# Redis 타임아웃 / 세션 청소 / 컨텍스트 토큰 예산
app.s3.bucket=${S3_BUCKET:}
app.s3.key-prefix=${S3_KEY_PREFIX:ai}
app.s3.presign-ttl-seconds=${S3_PRESIGN_TTL_SECONDS:3600}
app.s3.region=${S3_REGION:ap-northeast-2}
drawe.llm.context.current-budget=${CONTEXT_CURRENT_BUDGET:1500}
drawe.llm.context.history-budget=${CONTEXT_HISTORY_BUDGET:4000}
drawe.llm.context.system-budget=${CONTEXT_SYSTEM_BUDGET:1200}
drawe.llm.context.total-budget=${CONTEXT_TOTAL_BUDGET:8000}
drawe.session.cleanup-cron=${SESSION_CLEANUP_CRON:0 0 4 * * *}
drawe.session.cleanup-enabled=${SESSION_CLEANUP_ENABLED:false}
drawe.session.inactive-threshold-days=${SESSION_INACTIVE_THRESHOLD_DAYS:90}
fastapi.timeout-ms=${FASTAPI_TIMEOUT_MS:5000}
management.health.circuitbreakers.enabled=true
pinecone.timeout-ms=${PINECONE_TIMEOUT_MS:5000}
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.ignore-exceptions=com.drawe.backend.global.error.CustomException
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.record-exceptions=java.io.IOException,java.util.concurrent.TimeoutException,org.springframework.web.client.HttpServerErrorException,org.springframework.web.reactive.function.client.WebClientRequestException
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.embed.base-config=default
resilience4j.circuitbreaker.instances.vector.base-config=default
resilience4j.retry.configs.default.ignore-exceptions=com.drawe.backend.global.error.CustomException
resilience4j.retry.configs.default.max-attempts=2
resilience4j.retry.configs.default.retry-exceptions=java.io.IOException,java.util.concurrent.TimeoutException,org.springframework.web.client.HttpServerErrorException,org.springframework.web.reactive.function.client.WebClientRequestException
resilience4j.retry.configs.default.wait-duration=300ms
resilience4j.retry.instances.embed.base-config=default
resilience4j.retry.instances.vector.base-config=default
spring.data.redis.timeout=${REDIS_TIMEOUT:3s}
workflow.compose.live-intents=${WORKFLOW_COMPOSE_LIVE_INTENTS:}
