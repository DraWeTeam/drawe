<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawe 이메일 인증</title>
</head>
<!-- 이메일 클라이언트 호환을 위해 스타일은 인라인 + table 레이아웃 사용 -->
<body style="margin:0; padding:0; background-color:#f4f5f7;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
         style="background-color:#f4f5f7; padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
               style="max-width:480px; background-color:#ffffff; border-radius:16px;
                      overflow:hidden; font-family:'Apple SD Gothic Neo',Roboto,'Segoe UI',sans-serif;
                      border:1px solid #eee;">
          <!-- 헤더 (로고) -->
          <tr>
            <td align="center" style="padding:32px 24px 16px 24px;">
              <!-- cid:logo = MailService 가 인라인 첨부한 drawe_logo.png -->
              <img src="cid:logo" alt="Drawe" width="56" height="56"
                   style="display:block; width:56px; height:56px; border-radius:14px;" />
              <div style="margin-top:10px; font-size:20px; font-weight:700;
                          color:#1a1a2e; letter-spacing:0.5px;">Drawe</div>
            </td>
          </tr>

          <!-- 본문 -->
          <tr>
            <td style="padding:8px 32px 0 32px;">
              <h1 style="margin:0 0 12px 0; font-size:18px; color:#1a1a2e;">이메일 인증번호</h1>
              <p style="margin:0; font-size:14px; line-height:22px; color:#555;">
                아래 인증번호를 입력 화면에 그대로 입력해주세요.<br />
                인증번호는 <strong style="color:#1a1a2e;">5분간</strong> 유효합니다.
              </p>
            </td>
          </tr>

          <!-- 인증번호 박스 -->
          <tr>
            <td style="padding:24px 32px;">
              <div style="background-color:#fff3e9; border:1px solid #fcd9bb; border-radius:12px;
                          padding:22px 0; text-align:center;">
                <span th:text="${code}"
                      style="font-size:36px; font-weight:700; letter-spacing:10px;
                             color:#f5872e; font-family:'Courier New',monospace;">000000</span>
              </div>
            </td>
          </tr>

          <!-- 안내 -->
          <tr>
            <td style="padding:0 32px 36px 32px;">
              <p style="margin:0; font-size:12px; line-height:20px; color:#999;">
                본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다.<br />
                인증번호를 타인에게 절대 공유하지 마세요.
              </p>
            </td>
          </tr>

          <!-- 푸터 -->
          <tr>
            <td align="center" style="background-color:#fafbfc; padding:20px 24px; border-top:1px solid #f0f0f0;">
              <span style="font-size:11px; color:#bbb;">© Drawe. All rights reserved.</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
