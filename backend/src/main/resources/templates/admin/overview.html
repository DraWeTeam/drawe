<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/fragments :: head('Drawe Admin · Overview')}"></head>
<body>
<header th:replace="~{admin/fragments :: topbar('overview')}"></header>

<main class="wrap" id="admin-content">
  <div th:replace="~{admin/fragments :: pageIdentity('오늘 우리 서비스에 이상한 일이 있었는가?', 'monitor')}"></div>
  <div class="pagehead">
    <div>
      <h1>Overview</h1>
      <div class="meta">
        최근 <span th:text="${hours}">24</span>시간 ·
        기준 <span th:text="${kpi.generatedAtText()}">-</span>
      </div>
    </div>
    <div class="ranges" hx-boost="true" hx-target="#admin-content" hx-select="#admin-content" hx-swap="outerHTML">
      <a th:href="@{/admin/overview(hours=24)}" th:classappend="${kpi.windowHours() == 24} ? 'active'">24h</a>
      <a th:href="@{/admin/overview(hours=168)}" th:classappend="${kpi.windowHours() == 168} ? 'active'">7d</a>
      <a th:href="@{/admin/overview(hours=720)}" th:classappend="${kpi.windowHours() == 720} ? 'active'">30d</a>
    </div>
  </div>

  <!-- 핵심: North Star(헤드라인) + Guardrail(채팅 성공률, 임계 위반 시 빨강 강조) -->
  <section class="grid">
    <div th:replace="~{admin/fragments :: kpiCard('ns', '활성 사용자', ${kpi.activeUsers()}, '사용자 단위', '봇·내부 트래픽 미제외, 표본 작음 — 추세로만', 'yellow', 'none')}"></div>
    <div th:replace="~{admin/fragments :: kpiCard('guardrail', '채팅 성공률', ${kpi.successRateText()}, '채팅 턴 단위', '시스템 실패 여부만 측정 — 답변 품질은 못 봄', 'green', ${kpi.successRate() != null and kpi.successRate() < 95.0 ? 'bad' : 'none'})}"></div>
  </section>

  <!-- Diagnostic: 평소엔 안 봐도 되는 진단 지표 (접기 가능) -->
  <details class="diag" open style="margin-bottom: 18px;">
    <summary style="cursor:pointer; font-size:15px; font-weight:700; color:var(--ink); margin:2px 0 14px;">
      🔍 Diagnostic <span class="meta" style="font-weight:500;">— 평소엔 안 봐도 되는 진단 지표</span>
    </summary>

    <section class="grid">
      <div th:replace="~{admin/fragments :: kpiCard('diag', '에러율', ${kpi.errorRateText()}, '채팅 턴 단위', '실패 규모만 — 원인·예외 종류는 observability(Loki) 담당', 'green', 'none')}"></div>
      <div th:replace="~{admin/fragments :: kpiCard('diag', '검색 차단율', ${kpi.searchBlockRateText()}, '검색 시도 단위', '차단 비율만 — 차단 사유별 분해는 미제공', 'green', 'none')}"></div>
    </section>

    <section class="panel">
      <h2><span th:replace="~{admin/fragments :: categoryBadge('diag')}"></span> 이벤트 분포 <span class="tag">전체 event_type</span></h2>
      <div class="chartbox" th:if="${!kpi.eventDistribution().isEmpty()}"><canvas id="ov-events"></canvas></div>
      <table th:if="${!kpi.eventDistribution().isEmpty()}">
        <thead><tr><th>event_type</th><th class="num">건수</th></tr></thead>
        <tbody>
          <tr th:each="d : ${kpi.eventDistribution()}">
            <td class="mono" th:text="${d.eventType()}">-</td>
            <td class="num" th:text="${d.count()}">0</td>
          </tr>
        </tbody>
      </table>
      <div class="empty" th:if="${kpi.eventDistribution().isEmpty()}">이 구간에 이벤트가 없어요.</div>
    </section>
  </details>

  <!-- WP0: 긴급도 범례 렌더 검증 -->
  <div th:replace="~{admin/fragments :: urgencyLegend()}"></div>

  <script th:inline="javascript">
    (function () {
      var ev = /*[[${kpi.eventDistribution()}]]*/ [];
      window.__adminCharts = function () {
        var D = window.Drawe; if (!D) return;
        if (ev.length) D.hbars('ov-events', ev.map(function (x) { return x.eventType; }), ev.map(function (x) { return x.count; }));
      };
      window.__adminRun && window.__adminRun();
    })();
  </script>
</main>
</body>
</html>
