<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/fragments :: head('Drawe Admin · 이용 흐름')}"></head>
<body>
<header th:replace="~{admin/fragments :: topbar('flow')}"></header>

<main class="wrap" id="admin-content" th:with="v=${view}">
  <div th:replace="~{admin/fragments :: pageIdentity('사용자가 어느 단계에서 이탈하는가?', 'monitor')}"></div>
  <div class="pagehead">
    <div>
      <h1>이용 흐름</h1>
      <div class="meta">
        단계별 사용자 흐름 · 최근 <span th:text="${hours}">168</span>시간 · 기준 <span th:text="${v.generatedAtText()}">-</span>
      </div>
    </div>
    <div class="ranges" hx-boost="true" hx-target="#admin-content" hx-select="#admin-content" hx-swap="outerHTML">
      <a th:href="@{/admin/flow(hours=24)}"  th:classappend="${hours == 24} ? 'active'">24h</a>
      <a th:href="@{/admin/flow(hours=168)}" th:classappend="${hours == 168} ? 'active'">7d</a>
      <a th:href="@{/admin/flow(hours=720)}" th:classappend="${hours == 720} ? 'active'">30d</a>
    </div>
  </div>

  <!-- 핵심: KO 응답 성공 도달율(헤드라인) + Guardrail 에러 발생 세션 -->
  <section class="grid">
    <div th:replace="~{admin/fragments :: kpiCard('ko', '응답 성공 도달율', ${v.succeededReachText()}, '', '채팅이 응답까지 간 비율 (내용 만족도는 아님)', 'green', ${v.succeededReach() != null and v.succeededReach() < 80.0 ? 'bad' : 'none'})}"></div>
    <div th:replace="~{admin/fragments :: kpiCard('guardrail', '에러 발생 세션', ${v.erroredSessions()}, '', '에러가 난 대화가 몇 건인지', 'green', ${v.erroredSessions() > 0 ? 'bad' : 'none'})}"></div>
  </section>

  <!-- Diagnostic: 평소엔 안 봐도 되는 진단 지표 (접기 가능) -->
  <details class="diag" open style="margin-bottom: 18px;">
    <summary style="cursor:pointer; font-size:15px; font-weight:700; color:var(--ink); margin:2px 0 14px;">
      🔍 자세히 보기 <span class="meta" style="font-weight:500;">— 평소엔 안 봐도 돼요</span>
    </summary>

    <section class="panel">
      <h2><span th:replace="~{admin/fragments :: categoryBadge('diag')}"></span> 채팅 → 검색 → 성공 <span class="tag">세션 도달</span></h2>
      <div class="empty" th:if="${v.stages()[0].sessions() == 0}">이 기간에 세션 이벤트가 없어요. (윈도우를 7d/30d로 넓혀보세요.)</div>
      <div th:if="${v.stages()[0].sessions() > 0}">
        <div th:each="st : ${v.stages()}" style="margin-bottom:16px;">
          <div style="display:flex; justify-content:space-between; align-items:baseline;">
            <span style="font-weight:600;" th:text="${st.label()}">채팅 시작</span>
            <span class="mono" style="font-size:13.5px;">
              <b style="font-size:16px;" th:text="${st.sessions()}">0</b> 세션
              <span class="meta" th:if="${st.reachRate() != null}"
                    th:text="' · ' + ${#numbers.formatPercent(st.reachRate(),1,0)}"> · 100%</span>
            </span>
          </div>
          <div style="height:10px; background:var(--line-soft); border-radius:999px; overflow:hidden; margin-top:6px;">
            <div th:style="'width:' + ${st.barPct()} + '%; height:100%; background:var(--accent-bright); border-radius:999px;'"></div>
          </div>
        </div>
        <div class="meta" style="margin-top:4px; line-height:1.6;">
          각 단계까지 도달한 비율이에요. 사용자가 어디서 많이 빠지는지 보세요.
          수치가 100% 근처로 겹쳐 보일 수 있으니 도달률로 보세요.
        </div>
      </div>
    </section>

    <section class="grid">
      <div th:replace="~{admin/fragments :: kpiCard('diag', '검색 차단 세션', ${v.blockedSessions()}, '', '결과가 부실해 검색이 막힌 경우', 'green', 'none')}"></div>
      <div th:replace="~{admin/fragments :: kpiCard('diag', '온보딩 완료', ${v.onboardedSessions()}, '', '온보딩을 끝낸 사용자 수', ${v.totalSessions() &lt; 30 ? 'yellow' : 'green'}, 'none')}"></div>
      <div th:replace="~{admin/fragments :: kpiCard('diag', '전체 세션', ${v.totalSessions()}, '', '얼마나 이용했는지 (비율의 기준)', 'green', 'none')}"></div>
    </section>
  </details>
</main>
</body>
</html>
