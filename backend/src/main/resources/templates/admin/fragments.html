<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title}">Drawe Admin</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <style>
    :root {
      --bg: #fbf8f3; --surface: #ffffff; --ink: #1f2825; --muted: #8c8a83;
      --line: #efeae1; --line-soft: #f4efe7; --line-strong: #ddd6ca;
      --accent: #db6418;          /* 읽히는 주황: 뱃지 글자 + 채움 */
      --accent-bright: #ff8434;   /* 브랜드 강조: 활성 토글 · 로고 */
      --accent-soft: #fff1dc;     /* 피치 틴트 */
      --peach-line: #ffe1bd;
      --danger: #cf3b2e; --danger-soft: #fbe9e6;
      --warn: #9a6b08; --warn-soft: #fbf0d2;
      --shadow: 0 1px 2px rgba(31,40,37,.04), 0 6px 18px rgba(31,40,37,.05);
      --shadow-sm: 0 1px 2px rgba(31,40,37,.05), 0 2px 6px rgba(31,40,37,.04);
      --r: 15px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: "Pretendard", "Pretendard Variable", -apple-system, system-ui,
                   "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased;
    }
    .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    a { color: inherit; }

    /* ---------- topbar ---------- */
    .topbar {
      display: flex; align-items: center; gap: 26px;
      padding: 0 26px; height: 62px; background: var(--surface);
      border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5;
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo .mark {
      width: 30px; height: 30px; border-radius: 9px; background: var(--accent-bright);
      display: grid; place-items: center; box-shadow: 0 2px 6px rgba(255,132,52,.4);
    }
    .logo .word { font-weight: 800; font-size: 19px; letter-spacing: -.02em; }
    .logo .word b { color: var(--accent-bright); }
    .logo .tag {
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: var(--accent-soft); padding: 2px 8px; border-radius: 999px; margin-left: 2px;
    }
    /* login 페이지가 쓰는 .brand 텍스트 스타일 */
    .brand { font-weight: 800; letter-spacing: -.02em; }
    .brand b { color: var(--accent); }

    .nav { display: flex; gap: 4px; flex: 1; }
    .nav a {
      text-decoration: none; color: var(--muted); font-weight: 600; font-size: 14px;
      padding: 7px 14px; border-radius: 10px;
    }
    .nav a:hover { color: var(--ink); background: var(--line-soft); }
    .nav a.active { color: var(--accent); background: var(--accent-soft); }
    .nav span.soon { color: var(--line-strong); padding: 7px 14px; font-size: 14px; cursor: default; }

    .logout button {
      font: inherit; font-size: 13px; font-weight: 600; color: var(--muted);
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 999px; padding: 6px 15px; cursor: pointer;
    }
    .logout button:hover { color: var(--ink); border-color: var(--line-strong); background: var(--line-soft); }

    /* ---------- layout ---------- */
    .wrap { max-width: 1040px; margin: 0 auto; padding: 30px 28px; }
    .pagehead { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .pagehead h1 { font-size: 24px; font-weight: 800; letter-spacing: -.02em; margin: 0; }
    .meta { color: var(--muted); font-size: 13px; }

    .ranges {
      display: flex; gap: 4px; background: var(--surface); padding: 4px;
      border-radius: 999px; border: 1px solid var(--line); box-shadow: var(--shadow-sm);
    }
    .ranges a {
      text-decoration: none; font-size: 13px; font-weight: 600; color: var(--muted);
      border-radius: 999px; padding: 5px 14px;
    }
    .ranges a:hover { color: var(--ink); }
    .ranges a.active { color: #fff; background: var(--accent-bright); box-shadow: 0 2px 6px rgba(255,132,52,.35); }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 760px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 18px 20px; box-shadow: var(--shadow); }
    .card .label { font-size: 13px; font-weight: 600; color: var(--muted); }
    .card .value { font-size: 34px; font-weight: 800; letter-spacing: -.02em; margin-top: 10px; line-height: 1; font-variant-numeric: tabular-nums; }
    .card .value.good { color: var(--accent); }
    .card .value.bad { color: var(--danger); }
    .card .value.muted { color: var(--line-strong); }
    .card .foot { font-size: 12.5px; color: var(--muted); margin-top: 10px; }

    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 20px 22px; margin-bottom: 18px; box-shadow: var(--shadow); }
    .panel h2 { font-size: 16px; font-weight: 700; margin: 0 0 14px; display: flex; align-items: center; gap: 9px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 760px) { .cols { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 6px; border-bottom: 1px solid var(--line-soft); }
    th { color: var(--muted); font-weight: 600; font-size: 12.5px; }
    td.num, th.num { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
    tr:last-child td { border-bottom: none; }

    .tag { display: inline-block; font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); }
    .empty { color: var(--muted); font-size: 13.5px; padding: 6px 0; }

    .statline { display: flex; gap: 30px; flex-wrap: wrap; }
    .statline div span { display: block; }
    .statline .k { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
    .statline .v { font-size: 22px; font-weight: 800; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
    .statline .v.muted { color: var(--line-strong); }

    /* ---------- charts ---------- */
    .chartbox { position: relative; width: 100%; height: 240px; }
    .chartbox.sm { height: 150px; }
    .chartbox.lg { height: 300px; }
    .panel h2 .tag { margin-left: 2px; }
    .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 10px; }
    .chart-legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
    /* htmx 전환 중 살짝 흐려지는 피드백 (선택) */
    #admin-content.htmx-swapping { opacity: .55; transition: opacity .12s ease; }
  </style>

  <!-- 차트 + 부분 갱신: 둘 다 기존에 쓰는 jsDelivr에서 로드 (백엔드 변경 0) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <script>
    /* 공용 차트 헬퍼 — head 프래그먼트는 htmx 스왑 대상이 아니라 한 번만 정의된다.
       색은 위 :root 토큰에서 읽어와 화면과 항상 일치. 각 탭은 window.__adminCharts 만 정의하면 됨. */
    (function () {
      var css = getComputedStyle(document.documentElement);
      function tok(n, fb) { var v = css.getPropertyValue(n); return v ? v.trim() : fb; }
      var T = {
        accent: tok('--accent', '#db6418'), accentBright: tok('--accent-bright', '#ff8434'),
        danger: tok('--danger', '#cf3b2e'), warn: tok('--warn', '#9a6b08'),
        muted: tok('--muted', '#8c8a83'), line: tok('--line', '#efeae1'),
        ink: tok('--ink', '#1f2825'), surface: tok('--surface', '#ffffff'),
      };

      if (window.Chart) {
        Chart.defaults.font.family = '"Pretendard","Pretendard Variable",-apple-system,system-ui,"Malgun Gothic",sans-serif';
        Chart.defaults.font.size = 12;
        Chart.defaults.color = T.muted;
        Chart.defaults.maintainAspectRatio = false;
        Chart.defaults.plugins.legend.display = false;
        Chart.defaults.animation.duration = 350;
      }

      var tip = { backgroundColor: T.ink, titleColor: '#e9e3d8', bodyColor: '#fff',
        cornerRadius: 10, padding: 11, displayColors: true, boxWidth: 9, boxHeight: 9, boxPadding: 4 };
      var grid = { color: T.line, drawTicks: false };
      var noGrid = { display: false };

      function fresh(id) {
        var el = document.getElementById(id);
        if (!el || !window.Chart) return null;
        var prev = Chart.getChart(el); if (prev) prev.destroy();
        return el;
      }

      window.DraweTokens = T;
      window.Drawe = {
        tokens: T,
        // 세로 막대 (일별/시계열)
        bars: function (id, labels, data, o) { o = o || {}; var el = fresh(id); if (!el) return;
          new Chart(el, { type: 'bar',
            data: { labels: labels, datasets: [{ label: o.label || '', data: data, backgroundColor: o.color || T.accent, borderRadius: 4, maxBarThickness: 40 }] },
            options: { scales: { x: { grid: noGrid, border: { color: T.line }, ticks: { maxRotation: 0, autoSkip: true } },
              y: { beginAtZero: true, grid: grid, border: { display: false }, ticks: { precision: 0 } } }, plugins: { tooltip: tip } } });
        },
        // 가로 막대 (분포/랭킹)
        hbars: function (id, labels, data, o) { o = o || {}; var el = fresh(id); if (!el) return;
          new Chart(el, { type: 'bar',
            data: { labels: labels, datasets: [{ label: o.label || '', data: data, backgroundColor: o.color || T.accent, borderRadius: 4, maxBarThickness: 26 }] },
            options: { indexAxis: 'y', scales: { x: { beginAtZero: true, grid: grid, border: { display: false }, ticks: { precision: 0 } },
              y: { grid: noGrid, border: { color: T.line } } }, plugins: { tooltip: tip } } });
        },
        // 누적 가로 막대 (입력/출력 토큰 등)
        stackedH: function (id, labels, series) { var el = fresh(id); if (!el) return;
          new Chart(el, { type: 'bar',
            data: { labels: labels, datasets: series.map(function (s) { return { label: s.label, data: s.data, backgroundColor: s.color, borderRadius: 3, maxBarThickness: 26, stack: 's' }; }) },
            options: { indexAxis: 'y', scales: { x: { beginAtZero: true, stacked: true, grid: grid, border: { display: false } },
              y: { stacked: true, grid: noGrid, border: { color: T.line } } }, plugins: { tooltip: tip } } });
        },
        // 도넛 (상태 비율)
        doughnut: function (id, labels, data, colors) { var el = fresh(id); if (!el) return;
          new Chart(el, { type: 'doughnut',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderColor: T.surface, borderWidth: 2 }] },
            options: { cutout: '64%', plugins: { tooltip: tip } } });
        },
      };

      // htmx 스왑 직후엔 레이아웃이 아직 안 끝나 컨테이너 크기가 0 → 차트가 0×0으로 그려진다.
      // rAF 두 번으로 레이아웃 확정 뒤에 그린다(전체 로드/부분 갱신 모두 안전).
      function run() {
        if (typeof window.__adminCharts !== 'function') return;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            try { window.__adminCharts(); } catch (e) { console.error('admin chart init', e); }
          });
        });
      }
      window.__adminRun = run;   // 각 탭 스크립트가 직접 호출해도 됨(이벤트 타이밍 의존 제거)
      if (document.readyState !== 'loading') run(); else document.addEventListener('DOMContentLoaded', run);
      document.addEventListener('htmx:afterSettle', run);   // 기간 전환(부분 갱신) 후 — settle 완료 시점
      document.addEventListener('htmx:afterSwap', run);     // 백업
    })();
  </script>
</head>
<body>
<header th:fragment="topbar(active)" class="topbar">
  <span class="logo">
    <span class="mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6.8 4.6C6.8 3.7 7.8 3.2 8.5 3.7L19 10.9C19.8 11.4 19.8 12.6 19 13.1L8.5 20.3C7.8 20.8 6.8 20.3 6.8 19.4V4.6Z" fill="#FBEAD8"/><path d="M6.8 4.6C6.8 3.7 7.8 3.2 8.5 3.7L19 10.9C19.3 11.1 19.5 11.4 19.6 11.7L6.8 11.7V4.6Z" fill="#F2D4AC"/><path d="M6.8 15.4L10.6 17.6L8.5 20.3C7.8 20.8 6.8 20.3 6.8 19.4V15.4Z" fill="#3A2A1C"/></svg></span>
    <span class="word">Dra<b>We</b></span><span class="tag">admin</span>
  </span>
  <nav class="nav">
    <a href="/admin/overview" th:classappend="${active == 'overview'} ? 'active'">Overview</a>
    <a href="/admin/flow" th:classappend="${active == 'flow'} ? 'active'">흐름</a>
    <a href="/admin/funnel" th:classappend="${active == 'funnel'} ? 'active'">Funnel</a>
    <a href="/admin/search-quality" th:classappend="${active == 'search'} ? 'active'">검색 품질</a>
    <a href="/admin/translation" th:classappend="${active == 'translation'} ? 'active'">번역 실패</a>
    <a href="/admin/cost" th:classappend="${active == 'cost'} ? 'active'">비용</a>
  </nav>
  <form class="logout" th:action="@{/admin/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit">로그아웃</button>
  </form>
</header>
</body>
</html>
