<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{admin/fragments :: head('Drawe Admin · 로그인')}"></head>
<body>
<main style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
  <div style="width: 320px; background: var(--surface); border: 1px solid var(--line);
              border-radius: 14px; padding: 28px 26px;">
    <div class="brand" style="font-size: 18px; margin-bottom: 4px;">drawe<b style="color:var(--accent)">/</b>admin</div>
    <div class="meta" style="margin-bottom: 20px;">내부 운영 도구</div>

    <div th:if="${param.error}"
         style="background: var(--danger-soft); color: var(--danger); font-size: 13px;
                padding: 8px 12px; border-radius: 8px; margin-bottom: 14px;">
      아이디 또는 비밀번호가 올바르지 않아요.
    </div>
    <div th:if="${param.logout}"
         style="background: var(--accent-soft); color: var(--accent); font-size: 13px;
                padding: 8px 12px; border-radius: 8px; margin-bottom: 14px;">
      로그아웃됐어요.
    </div>

    <form th:action="@{/admin/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:4px;">아이디</label>
      <input name="username" autocomplete="username" autofocus
             style="width:100%; padding:9px 11px; border:1px solid var(--line-strong);
                    border-radius:8px; font:inherit; margin-bottom:14px;"/>
      <label style="display:block; font-size:13px; color:var(--muted); margin-bottom:4px;">비밀번호</label>
      <input name="password" type="password" autocomplete="current-password"
             style="width:100%; padding:9px 11px; border:1px solid var(--line-strong);
                    border-radius:8px; font:inherit; margin-bottom:18px;"/>
      <button type="submit"
              style="width:100%; padding:10px; border:none; border-radius:8px;
                     background:var(--accent); color:#fff; font:inherit; font-weight:500; cursor:pointer;">
        로그인
      </button>
    </form>
  </div>
</main>
</body>
</html>
