openapi: 3.0.3
info:
  title: DraWe Project API
  description: |
    DraWe 백엔드 프로젝트 API (SCRUM-45). 현재 구현된 5개 엔드포인트.
    - 모든 응답은 `{success, data}` 또는 `{success, error}` envelope을 사용합니다.
    - 모든 엔드포인트는 `Authorization: Bearer <accessToken>` 헤더를 요구합니다.
    - drawing 업로드 / chips suggest 는 다음 PR에서 추가될 예정입니다.
  version: "1.1.0"
servers:
  - url: http://localhost:8081
    description: 로컬 개발 서버

tags:
  - name: Projects
    description: 프로젝트 생성 / 조회 / 수정 / 삭제

security:
  - bearerAuth: []

paths:
  /projects:
    post:
      tags: [Projects]
      summary: 프로젝트 생성
      operationId: createProject
      description: |
        새 프로젝트를 생성합니다. 생성 시 status는 자동으로 `in_progress`.
        - `name`/`subject` 필수
        - `technique`/`mood`/`description` 선택
        - 첫 채팅 진입 시 프로젝트의 subject/technique/mood/description 이 LLM 시스템 프롬프트로 자동 주입됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            examples:
              full:
                summary: 모든 필드
                value:
                  name: "고양이 캐릭터 연습"
                  subject: "고양이 캐릭터"
                  technique: "digital-anime"
                  mood: "dreamy"
                  description: "표정 다양화 연습"
              minimal:
                summary: 필수 필드만
                value:
                  name: "바다 풍경"
                  subject: "바다"
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectDetail'
              example:
                success: true
                data:
                  id: 1
                  name: "고양이 캐릭터 연습"
                  subject: "고양이 캐릭터"
                  technique: "digital-anime"
                  mood: "dreamy"
                  description: "표정 다양화 연습"
                  status: "in_progress"
                  drawingUrl: null
                  suggestionsShown: false
                  board: []
                  createdAt: "2026-04-30T03:00:29.163606Z"
                  updatedAt: "2026-04-30T03:00:29.163606Z"
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Projects]
      summary: 내 프로젝트 목록
      operationId: listProjects
      description: |
        본인 소유 프로젝트 목록을 최신순(createdAt DESC)으로 반환합니다.
        - `status` 미지정 시 전체
        - `limit/offset` 으로 페이징 (정확한 offset 지원)
      parameters:
        - name: status
          in: query
          required: false
          description: 필터링할 상태
          schema:
            type: string
            enum: [in_progress, completed]
        - name: limit
          in: query
          required: false
          description: 페이지 크기 (기본 20, 최소 1)
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          description: 시작 인덱스 (기본 0)
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectListData'
              example:
                success: true
                data:
                  projects:
                    - id: 3
                      name: "Minimal project"
                      technique: null
                      status: "in_progress"
                      referenceCount: 0
                      createdAt: "2026-04-30T03:00:29.210002Z"
                      updatedAt: "2026-04-30T03:00:29.210002Z"
                    - id: 2
                      name: "Cat character practice"
                      technique: "digital-anime"
                      status: "in_progress"
                      referenceCount: 0
                      createdAt: "2026-04-30T03:00:29.163606Z"
                      updatedAt: "2026-04-30T03:00:29.163606Z"
                  total: 2
                  hasMore: false
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /projects/{projectId}:
    get:
      tags: [Projects]
      summary: 프로젝트 상세
      operationId: getProject
      description: |
        본인 소유 프로젝트의 상세 정보. board는 ProjectReference 연결이 구현되기 전까지 빈 배열을 반환합니다.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Projects]
      summary: 프로젝트 수정
      operationId: updateProject
      description: |
        본인 소유 프로젝트의 일부 필드를 수정합니다. **null 미포함 필드는 수정하지 않습니다(부분 업데이트).**
        - `status`는 `in_progress` / `completed` 만 허용
        - `detailAnswers`는 임의 JSON 객체 (저장 후 응답엔 노출되지 않음)
        - LLM 시스템 프롬프트의 프로젝트 컨텍스트는 **새 채팅 세션이 만들어질 때** 갱신됩니다 (기존 세션엔 반영 안 됨).
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
            examples:
              renameOnly:
                summary: 이름만 변경
                value:
                  name: "고양이 캐릭터 연습 v2"
              complete:
                summary: 완료 처리
                value:
                  status: "completed"
              detailAnswers:
                summary: 세부 답변 저장
                value:
                  detailAnswers:
                    style_choice: "soft"
                    palette: ["pastel pink", "ivory"]
      responses:
        '200':
          description: 수정 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SimpleSuccess'
              example:
                success: true
                data:
                  success: true
        '400':
          $ref: '#/components/responses/InvalidInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Projects]
      summary: 프로젝트 삭제
      operationId: deleteProject
      description: |
        본인 소유 프로젝트를 삭제합니다.
        - 연결된 `ProjectReference` (board), `ChatSession`, `LlmMessage` 가 함께 삭제됩니다 (cascade).
        - drawing 파일 자체(S3/Cloudinary 등)는 유지됩니다 (DB의 drawingUrl 참조만 끊김).
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 삭제 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SimpleSuccess'
              example:
                success: true
                data:
                  success: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateProjectRequest:
      type: object
      required: [name, subject]
      properties:
        name:
          type: string
          maxLength: 100
          description: 프로젝트 이름
          example: "고양이 캐릭터 연습"
        subject:
          type: string
          maxLength: 100
          description: 뭘 그릴지
          example: "고양이 캐릭터"
        technique:
          type: string
          maxLength: 30
          nullable: true
          description: 목표 스타일
          example: "digital-anime"
        mood:
          type: string
          maxLength: 30
          nullable: true
          description: 목표 분위기
          example: "dreamy"
        description:
          type: string
          nullable: true
          description: 프로젝트 설명

    UpdateProjectRequest:
      type: object
      description: 변경할 필드만 포함. null 포함 시 그 필드는 그대로 두고 싶다면 키 자체를 빼야 함.
      properties:
        name:
          type: string
          maxLength: 100
        subject:
          type: string
          maxLength: 100
        technique:
          type: string
          maxLength: 30
        mood:
          type: string
          maxLength: 30
        description:
          type: string
        status:
          type: string
          enum: [in_progress, completed]
        detailAnswers:
          type: object
          additionalProperties: true
          description: 세부 질문 답변 JSON. 그대로 저장되며 현재 응답엔 노출되지 않습니다.

    ProjectDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "고양이 캐릭터 연습"
        subject:
          type: string
          nullable: true
          example: "고양이 캐릭터"
        technique:
          type: string
          nullable: true
          example: "digital-anime"
        mood:
          type: string
          nullable: true
          example: "dreamy"
        description:
          type: string
          nullable: true
          example: "표정 다양화 연습"
        status:
          type: string
          enum: [in_progress, completed]
          example: "in_progress"
        drawingUrl:
          type: string
          nullable: true
          description: 업로드된 그림 URL (drawing 업로드 API 연결 후 채워짐)
        suggestionsShown:
          type: boolean
          example: false
        board:
          type: array
          description: 프로젝트 참고 이미지 목록 (현재 빈 배열)
          items:
            $ref: '#/components/schemas/BoardItem'
        createdAt:
          type: string
          format: date-time
          example: "2026-04-30T03:00:29.163606Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-30T03:00:29.163606Z"

    BoardItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
        technique:
          type: string
          nullable: true
        subject:
          type: string
          nullable: true
        mood:
          type: string
          nullable: true
        addedAt:
          type: string
          format: date-time

    ProjectListItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        technique:
          type: string
          nullable: true
        status:
          type: string
          enum: [in_progress, completed]
        referenceCount:
          type: integer
          format: int64
          description: 연결된 참고 이미지 수
          example: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectListData:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectListItem'
        total:
          type: integer
          format: int64
          description: 필터 적용 후 전체 개수
          example: 2
        hasMore:
          type: boolean
          description: offset + projects.size < total 이면 true
          example: false

    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          description: 응답 데이터 (엔드포인트별 스키마)

    SimpleSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "NOT_FOUND"
            message:
              type: string
              example: "리소스를 찾을 수 없습니다."
            timestamp:
              type: string
              format: date-time

  responses:
    InvalidInput:
      description: 잘못된 요청 (필수 필드 누락, 잘못된 status 값 등)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: "INVALID_INPUT"
              message: "공백일 수 없습니다"
              timestamp: "2026-04-30T12:00:11.658Z"

    Unauthorized:
      description: 인증 필요 또는 토큰 무효
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: "UNAUTHORIZED"
              message: "인증이 필요합니다. 로그인 후 다시 시도해주세요."
              timestamp: "2026-04-30T12:00:11.692Z"

    Forbidden:
      description: 본인 소유가 아닌 프로젝트 접근
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: "FORBIDDEN"
              message: "접근 권한이 없습니다."
              timestamp: "2026-04-30T12:00:55.925Z"

    NotFound:
      description: 존재하지 않는 프로젝트 ID
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: "NOT_FOUND"
              message: "리소스를 찾을 수 없습니다."
              timestamp: "2026-04-30T12:00:55.570Z"
