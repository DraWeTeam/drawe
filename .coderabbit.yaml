language: ko-KR

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - develop
      - main

  profile: assertive

  path_filters:
    - "!package-lock.json"
    - "!yarn.lock"
    - "!pnpm-lock.yaml"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"

chat:
  auto_reply: true

