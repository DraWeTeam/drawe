  <title id="ttl">한끗가이드 이미지 기반 가이드 파이프라인</title>
  <desc id="desc">그림 업로드부터 OpenCLIP 임베딩, 관찰 신호 추출(ViTPose 바디 키포인트; 손 mediapipe·VLM은 옵트인), Qdrant 검색, Grok LLM 코칭, 가이드 결과까지의 비전 파이프라인. growth 이력을 반영해 개인화하고, 비전 파이프라인은 fastapi-guide가 담당한다.</desc>

