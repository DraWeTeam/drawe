    <g id="ic-bulb" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linejoin="round" stroke-linecap="round"><path d="M12 3a6 6 0 0 0-4 10.4c.6.6 1 1.3 1 2.6h6c0-1.3.4-2 1-2.6A6 6 0 0 0 12 3z"/><path d="M9.5 18.5h5M10.5 21h3"/></g>
