<svg viewBox="0 0 1580 330" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Malgun Gothic', sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Drawe 이미지 가이드 흐름</title>
  <desc id="desc">사용자 그림 업로드 → OpenCLIP 임베딩 → 관찰 신호 추출(ViTPose 바디 키포인트; 손 mediapipe·VLM은 옵트인) → Qdrant 유사 레퍼런스 검색 → Grok LLM 코칭 생성 → 한 끗 포인트·추천 연습 출력으로 이어지는 이미지 가이드 파이프라인.</desc>

