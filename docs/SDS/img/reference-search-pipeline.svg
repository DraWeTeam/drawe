<svg viewBox="0 0 2040 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Malgun Gothic', sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Drawe 레퍼런스 검색 파이프라인 (가로)</title>
  <desc id="desc">사용자 메시지를 의도 분류해 NEW_SEARCH면 위 레인의 키워드 추출·CLIP 임베딩·Pinecone 검색·MySQL 결합·re-rank를 거치고, KEEP/FOLLOWUP이면 아래 레인의 Redis 직전 레퍼런스를 재사용해, COMPOSE LLM에서 합쳐 응답을 반환하는 가로형 파이프라인.</desc>

