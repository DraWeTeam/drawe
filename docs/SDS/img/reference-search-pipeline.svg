<svg viewBox="0 0 1000 1134" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Malgun Gothic', sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Drawe 레퍼런스 검색 파이프라인</title>
  <desc id="desc">사용자 메시지를 의도 분류하여 NEW_SEARCH면 키워드 추출·CLIP 임베딩·Pinecone 검색·MySQL 결합·re-rank를 거치고, KEEP/FOLLOWUP이면 Redis 직전 레퍼런스를 재사용해, COMPOSE LLM에서 합쳐 응답을 반환하는 파이프라인.</desc>

  <defs>
    <g id="ic-chat" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linejoin="round" stroke-linecap="round"><path d="M5 6.5h14v9H11l-4 3v-3H5z"/><path d="M8.5 11h7"/></g>
    <g id="ic-fork" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"><circle cx="7" cy="6" r="2.1"/><circle cx="17" cy="6" r="2.1"/><circle cx="12" cy="18" r="2.1"/><path d="M7 8.1v1.4c0 2 1.6 3 5 3.4M17 8.1v1.4c0 2-1.6 3-5 3.4M12 13v2.9"/></g>
