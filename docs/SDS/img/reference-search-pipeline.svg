    <marker id="m-purple" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0 0l6 3-6 3z" fill="#7E51C8"/></marker>
    <marker id="m-green" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0 0l6 3-6 3z" fill="#3E9C6B"/></marker>
