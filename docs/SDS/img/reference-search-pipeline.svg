  <rect x="8" y="8" width="984" height="1118" rx="22" fill="#FBFAF7" stroke="#ECE7DF" stroke-width="1.5"/>

  <text x="44" y="56" font-size="27" font-weight="800" fill="#23221F">Drawe<tspan fill="#9A948B" font-weight="600"> · 레퍼런스 검색 파이프라인</tspan></text>
  <text x="46" y="82" font-size="13" fill="#8C867C">사용자 메시지 → 의도 분류 → 검색 / 재사용 → COMPOSE → 응답</text>
  <line x1="44" y1="98" x2="956" y2="98" stroke="#ECE7DF" stroke-width="1.5"/>

