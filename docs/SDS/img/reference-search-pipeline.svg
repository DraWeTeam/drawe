    <text x="161" y="400" font-size="11.5" fill="#9A948B">Komoran + 미술사전(247)</text>
    <text x="161" y="417" font-size="11.5" fill="#9A948B">+ Grok 폴백</text>
  </g>
  <g>
    <rect x="105" y="474" width="260" height="76" rx="12" fill="#FFFFFF" stroke="#5BC0B2" stroke-width="1.6"/>
