    <text x="691" y="385" font-size="15" font-weight="700" fill="#2A2925">직전 레퍼런스 재사용</text>
    <text x="691" y="405" font-size="11.5" fill="#9A948B">Redis 캐시</text>
    <text x="691" y="422" font-size="11" fill="#B0AAA0">검색 생략 · 맥락 유지</text>
  </g>

  <g>
    <rect x="320" y="908" width="360" height="98" rx="14" fill="#FFFFFF" stroke="#C9B0EC" stroke-width="1.8"/>
    <g transform="translate(338,932)" color="#7E51C8"><rect x="-2" y="-2" width="30" height="30" rx="8" fill="#EEE4FA"/><use href="#ic-chat" x="1.5" y="1.5"/></g>
