    <g id="ic-db" stroke="currentColor" stroke-width="1.7" fill="none"><ellipse cx="12" cy="6.5" rx="6.5" ry="2.6"/><path d="M5.5 6.5v11c0 1.4 2.9 2.6 6.5 2.6s6.5-1.2 6.5-2.6v-11" stroke-linecap="round"/><path d="M5.5 12c0 1.4 2.9 2.6 6.5 2.6s6.5-1.2 6.5-2.6"/></g>
    <g id="ic-sort" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"><path d="M5 7h12M5 12h8M5 17h4"/><circle cx="19" cy="7" r="1.2" fill="currentColor" stroke="none"/><circle cx="13" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="9" cy="17" r="1.2" fill="currentColor" stroke="none"/></g>
