  <g font-size="11.5" font-weight="700">
    <rect x="286" y="318" width="106" height="22" rx="11" fill="#EAF6F3" stroke="#9FD8CE"/><text x="339" y="333" text-anchor="middle" fill="#1B8576">NEW_SEARCH</text>
