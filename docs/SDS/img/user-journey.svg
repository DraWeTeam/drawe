  <text x="46" y="80" font-size="13" fill="#8C867C">로그인 → 프로젝트 → 레퍼런스 보드(키워드 검색 · 좋아요/싫어요 · AI 생성) → 그림 작업·업로드 → 가이드 코칭 → 갤러리</text>
