<svg viewBox="0 0 1576 468" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Segoe UI', 'Malgun Gothic', sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Drawe 주요 사용자 여정</title>
  <desc id="desc">로그인부터 프로젝트 생성, 레퍼런스 보드(키워드 검색 + 좋아요·싫어요 피드백, 원하는 레퍼런스가 없으면 보드에서 AI 이미지 생성), 그림 작업 후 업로드, 가이드 진단·코칭(ViTPose 관찰), 완성작 갤러리까지 이어지는 사용자 여정. 레퍼런스 탐색·생성 축과 가이드 코칭 축은 분리된다.</desc>

